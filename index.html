<style id="vire-tokens">

/* tokens/fonts.css */
/* ===========================================================================
   Vire — Webfonts
   Geometric sans: Plus Jakarta Sans (UI + display)
   Mono: JetBrains Mono (occasional data / code)

   NOTE: Loaded from Google Fonts CDN. To fully self-host, drop the .woff2
   files into /fonts and replace these @import lines with @font-face rules.
   Plus Jakarta Sans is an exact match (not a substitution).
   =========================================================================== */

@import url("https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400;1,500&family=JetBrains+Mono:wght@400;500;600&display=swap");

/* tokens/colors.css */
/* ===========================================================================
   Vire — Color tokens
   Warm, calm wellbeing palette built around the brand trio:
     • canvas  #FBF4ED (warm cream)
     • fields  #F8F9FC (cool near-white)
     • buttons #BCA5A8 (muted mauve)
   Brand accent is a deeper mauve/clay; movement = dusty blue, nutrition =
   apricot, rest = soft lilac. No teal/green in the brand world.
   Base values first, semantic aliases below.
   =========================================================================== */

:root {
  /* --- Brand: mauve / clay ------------------------------------------------- */
  --brand-50:  #F6EFEF;
  --brand-100: #EBDEDF;
  --brand-200: #DBC8CA;
  --brand-300: #C7ACAF;
  --brand-400: #AE9094;
  --brand-500: #8E7276; /* primary accent (reads with white text) */
  --brand-600: #75595D;
  --brand-700: #5E464A;
  --brand-800: #463437;
  --brand-900: #332628;

  /* --- Ink / neutral (warm-tinted, matches the cream canvas) --------------- */
  --ink-900: #2B2528; /* primary text, warm near-black */
  --ink-800: #3B3439;
  --ink-700: #524A4E;
  --ink-600: #6B6266;
  --ink-500: #948A8E; /* muted text */
  --ink-400: #B4ABAE;
  --ink-300: #D0C8CA;
  --ink-200: #E7E0E1;
  --ink-100: #F0EBEB;
  --ink-50:  #F8F4F4;
  --white:   #FFFFFF;

  /* --- Wellness accents (muted, warm-led) ---------------------------------- */
  /* movement / activity — dusty blue (token name kept for compatibility) */
  --sage-100: #E6EAF1;
  --sage-300: #B6C2D5;
  --sage-500: #7E94AC;
  --sage-700: #566B82;

  /* nutrition / energy — apricot */
  --apricot-100: #FBEADD;
  --apricot-300: #F2C6A3;
  --apricot-500: #E8A87C;
  --apricot-700: #C47E52;

  /* rest / mindfulness — soft lilac */
  --lilac-100: #EFE9F6;
  --lilac-500: #A88FB5;

  /* --- Semantic status (calm, never harsh) --------------------------------- */
  --green-100: #E6EFE6;
  --green-500: #6B9E78;
  --green-700: #4C7657;

  --amber-100: #FBEFD6;
  --amber-500: #E0A95E;
  --amber-700: #B47F34;

  --coral-100: #FBE3DE;
  --coral-500: #D77A6E; /* errors — terracotta, not fire-engine red */
  --coral-700: #B0564B;

  /* --- Semantic aliases ---------------------------------------------------- */
  /* Text */
  --text-primary:   var(--ink-900);
  --text-secondary: var(--ink-600);
  --text-muted:     var(--ink-500);
  --text-disabled:  var(--ink-400);
  --text-inverse:   var(--white);
  --text-brand:     var(--brand-600);
  --text-link:      var(--brand-600);

  /* Surfaces */
  --surface-page:   #FBF4ED; /* app canvas — warm cream */
  --surface-card:   #F8F9FC; /* cards & field content — cool near-white */
  --surface-sunken: #F1F2F7;
  --surface-raised: #F8F9FC;
  --surface-brand:  var(--brand-500);
  --surface-brand-soft: var(--brand-50);
  --surface-inverse: var(--ink-900);
  --surface-overlay: rgba(43, 37, 40, 0.45); /* scrim */

  /* Borders */
  --border-subtle:  var(--ink-200);
  --border-default: var(--ink-300);
  --border-strong:  var(--ink-400);
  --border-brand:   var(--brand-500);
  --border-focus:   var(--brand-500);

  /* Interactive brand (toggles, checks, solid icon buttons) */
  --action-brand:        var(--brand-500);
  --action-brand-hover:  var(--brand-600);
  --action-brand-active: var(--brand-700);

  /* Primary & active buttons — the muted mauve from the brief, dark ink text */
  --btn-primary-bg:        #BCA5A8;
  --btn-primary-bg-hover:  #AD9396;
  --btn-primary-bg-active: #9C8184;
  --btn-primary-ink:       #3D2F31;
  --btn-primary-shadow:    0 6px 18px rgba(120, 92, 96, 0.30);

  /* Accent semantics */
  --accent-movement:  var(--sage-500);
  --accent-nutrition: var(--apricot-500);
  --accent-rest:      var(--lilac-500);

  /* Status */
  --status-success:    var(--green-500);
  --status-success-bg: var(--green-100);
  --status-warning:    var(--amber-500);
  --status-warning-bg: var(--amber-100);
  --status-error:      var(--coral-500);
  --status-error-bg:   var(--coral-100);
  --status-info:       var(--brand-500);
  --status-info-bg:    var(--brand-50);

  /* Navigaatiopalkin tausta (light) */
  --nav-bg: rgba(255, 255, 255, 0.74);

  /* Etusivun immersiivinen pohja (hero tasoittuu tähän) — deep mauve */
  --home-base: #4A383B;

  /* Focus ring */
  --ring-focus: 0 0 0 3px rgba(142, 114, 118, 0.34);
}

/* ===========================================================================
   Dark theme — warm, mauve-tinted dark mirroring the light mood.
   Activated by [data-theme="dark"] on <html>. Remaps tint backgrounds,
   chip text, surfaces, text and borders so components adapt with no
   per-component changes.
   =========================================================================== */
[data-theme="dark"] {
  /* Soft tint backgrounds (icon chips, badges) → warm dark */
  --brand-50:  #2E2427;
  --brand-100: #392C30;
  --brand-200: #48383C;
  --sage-100:  #1F2630;
  --sage-300:  #3D4D60;
  --apricot-100: #392A1E;
  --apricot-300: #6E4D33;
  --lilac-100: #2A2436;
  --green-100: #1E2C20;
  --amber-100: #392E19;
  --coral-100: #392420;
  --ink-50:  #1E1A1B;
  --ink-100: #241F21;
  --ink-200: #322B2D;

  /* Chip / accent text → lightened for contrast on dark chips */
  --brand-600: #CBB0B3;
  --brand-700: #DBC5C7;
  --sage-700:  #AEC0D6;
  --apricot-700: #F2C6A3;
  --green-700: #9CC4A4;
  --amber-700: #E6C58C;
  --coral-700: #EBA99D;
  --ink-700:   #CDC4C6;
  --ink-600:   #B0A6A8;

  /* Text */
  --text-primary:   #F3ECED;
  --text-secondary: #B0A6A8;
  --text-muted:     #8A8082;
  --text-disabled:  #645B5D;
  --text-brand:     #CBB0B3;
  --text-link:      #CBB0B3;

  /* Surfaces */
  --surface-page:   #1A1618;
  --surface-card:   #241E20;
  --surface-sunken: #1F191B;
  --surface-raised: #2B2427;
  --surface-brand-soft: #2E2528;
  --surface-inverse: #F3ECED;
  --surface-overlay: rgba(8, 5, 6, 0.64);

  /* Borders */
  --border-subtle:  #2E2729;
  --border-default: #3D3438;
  --border-strong:  #4F4448;

  /* Navigaatiopalkin tausta (blur) */
  --nav-bg: rgba(26, 22, 24, 0.72);

  /* Etusivun immersiivinen pohja */
  --home-base: #241D1F;

  /* Status backgrounds stay dark via the *-100 overrides above */
  --status-success-bg: var(--green-100);
  --status-warning-bg: var(--amber-100);
  --status-error-bg:   var(--coral-100);
  --status-info-bg:    var(--brand-50);

  /* Softer focus ring on dark */
  --ring-focus: 0 0 0 3px rgba(190, 165, 168, 0.4);

  color-scheme: dark;
}

/* tokens/typography.css */
/* ===========================================================================
   Vire — Typography tokens
   Geometric sans (Plus Jakarta Sans) across the system. Numbers use the same
   family with tabular figures for stats/streaks.
   =========================================================================== */

:root {
  /* --- Families ------------------------------------------------------------ */
  --font-sans: "Plus Jakarta Sans", ui-sans-serif, system-ui, -apple-system,
    "Segoe UI", Roboto, sans-serif;
  --font-display: var(--font-sans);
  --font-mono: "JetBrains Mono", ui-monospace, "SF Mono", Menlo, monospace;

  /* --- Weights ------------------------------------------------------------- */
  --weight-regular:  400;
  --weight-medium:   500;
  --weight-semibold: 600;
  --weight-bold:     700;
  --weight-extra:    800;

  /* --- Type scale (1.250 major-third-ish, tuned) --------------------------- */
  --text-2xs:  0.6875rem;  /* 11px — micro labels */
  --text-xs:   0.75rem;    /* 12px */
  --text-sm:   0.875rem;   /* 14px */
  --text-base: 1rem;       /* 16px — body */
  --text-md:   1.125rem;   /* 18px */
  --text-lg:   1.375rem;   /* 22px */
  --text-xl:   1.75rem;    /* 28px */
  --text-2xl:  2.25rem;    /* 36px */
  --text-3xl:  2.875rem;   /* 46px */
  --text-4xl:  3.75rem;    /* 60px — display */

  /* --- Line heights -------------------------------------------------------- */
  --leading-tight:   1.12;
  --leading-snug:    1.28;
  --leading-normal:  1.5;
  --leading-relaxed: 1.7;

  /* --- Letter spacing ------------------------------------------------------ */
  --tracking-tight:  -0.02em;  /* large display */
  --tracking-snug:   -0.01em;  /* headings */
  --tracking-normal: 0;
  --tracking-wide:   0.04em;   /* eyebrows / overline */
  --tracking-caps:   0.08em;   /* all-caps labels */

  /* --- Semantic roles ------------------------------------------------------ */
  --display-size:   var(--text-4xl);
  --display-weight: var(--weight-bold);
  --display-leading: var(--leading-tight);
  --display-tracking: var(--tracking-tight);

  --h1-size: var(--text-3xl);
  --h2-size: var(--text-2xl);
  --h3-size: var(--text-xl);
  --h4-size: var(--text-lg);

  --body-size:   var(--text-base);
  --body-leading: var(--leading-normal);
  --body-small:  var(--text-sm);

  --label-size:   var(--text-sm);
  --label-weight: var(--weight-semibold);

  --eyebrow-size:   var(--text-xs);
  --eyebrow-weight: var(--weight-semibold);
  --eyebrow-tracking: var(--tracking-caps);
}

/* tokens/spacing.css */
/* ===========================================================================
   Vire — Spacing, radii, shadows, borders, layout
   Calm minimal: generous rounding, very soft cool-tinted shadows.
   4px base spacing scale.
   =========================================================================== */

:root {
  /* --- Spacing scale (4px base) -------------------------------------------- */
  --space-0:  0;
  --space-1:  0.25rem;  /* 4 */
  --space-2:  0.5rem;   /* 8 */
  --space-3:  0.75rem;  /* 12 */
  --space-4:  1rem;     /* 16 */
  --space-5:  1.25rem;  /* 20 */
  --space-6:  1.5rem;   /* 24 */
  --space-8:  2rem;     /* 32 */
  --space-10: 2.5rem;   /* 40 */
  --space-12: 3rem;     /* 48 */
  --space-16: 4rem;     /* 64 */
  --space-20: 5rem;     /* 80 */
  --space-24: 6rem;     /* 96 */

  /* --- Radii (generous, soft) ---------------------------------------------- */
  --radius-xs:   6px;
  --radius-sm:   10px;
  --radius-md:   14px;   /* default control */
  --radius-lg:   20px;   /* cards */
  --radius-xl:   28px;   /* large surfaces / sheets */
  --radius-2xl:  36px;
  --radius-pill: 999px;
  --radius-round: 50%;

  /* --- Border widths ------------------------------------------------------- */
  --border-thin:   1px;
  --border-medium: 1.5px;
  --border-thick:  2px;

  /* --- Shadows — soft, cool-tinted, low opacity ---------------------------- */
  --shadow-xs: 0 1px 2px rgba(39, 43, 61, 0.05);
  --shadow-sm: 0 1px 3px rgba(39, 43, 61, 0.06), 0 1px 2px rgba(39, 43, 61, 0.04);
  --shadow-md: 0 4px 12px rgba(39, 43, 61, 0.07), 0 2px 4px rgba(39, 43, 61, 0.04);
  --shadow-lg: 0 12px 28px rgba(39, 43, 61, 0.10), 0 4px 8px rgba(39, 43, 61, 0.04);
  --shadow-xl: 0 24px 56px rgba(39, 43, 61, 0.14), 0 8px 16px rgba(39, 43, 61, 0.06);
  --shadow-brand: 0 8px 24px rgba(142, 114, 118, 0.30);

  /* --- Layout -------------------------------------------------------------- */
  --container-max: 1200px;
  --sidebar-width: 252px;
  --content-gutter: var(--space-6);
  --app-mobile-width: 390px; /* iPhone canvas */

  /* --- Motion -------------------------------------------------------------- */
  --duration-fast:   140ms; /* @kind other */
  --duration-base:   240ms; /* @kind other */
  --duration-slow:   400ms; /* @kind other */
  --ease-standard: cubic-bezier(0.4, 0, 0.2, 1); /* @kind other */
  --ease-gentle:   cubic-bezier(0.32, 0.72, 0, 1); /* @kind other */ /* calm settle, no bounce */
  --ease-out:      cubic-bezier(0.16, 1, 0.3, 1); /* @kind other */
}

/* tokens/base.css */
/* ===========================================================================
   Vire — Base / reset
   Minimal, opinionated base layer that applies the brand defaults.
   Consumers get sensible typography + surface defaults for free.
   =========================================================================== */

*,
*::before,
*::after {
  box-sizing: border-box;
}

html {
  -webkit-text-size-adjust: 100%;
  text-size-adjust: 100%;
}

body {
  margin: 0;
  font-family: var(--font-sans);
  font-size: var(--body-size);
  line-height: var(--body-leading);
  font-weight: var(--weight-regular);
  color: var(--text-primary);
  background: var(--surface-page);
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  font-feature-settings: "cv11", "ss01";
}

h1, h2, h3, h4, h5, h6 {
  margin: 0;
  font-family: var(--font-display);
  font-weight: var(--weight-bold);
  line-height: var(--leading-tight);
  letter-spacing: var(--tracking-snug);
  color: var(--text-primary);
  text-wrap: balance;
}

p {
  margin: 0;
  text-wrap: pretty;
}

a {
  color: var(--text-link);
  text-decoration: none;
}
a:hover {
  text-decoration: underline;
}

button {
  font-family: inherit;
}

/* Tabular figures helper for stats / streaks / counters */
.vire-tnum {
  font-variant-numeric: tabular-nums;
  font-feature-settings: "tnum";
}

::selection {
  background: var(--brand-200);
  color: var(--ink-900);
}

</style>

  /* splash */
  #splash {
    position: fixed; inset: 0; z-index: 9999; display: grid; place-items: center;
    background: linear-gradient(155deg, #2B2528 0%, #5E464A 45%, #BCA5A8 130%);
    transition: opacity .5s ease; cursor: pointer;
  }
  #splash.hide { opacity: 0; pointer-events: none; }
  #splash .wrap { display: flex; flex-direction: column; align-items: center; gap: 18px; animation: splashIn .8s cubic-bezier(0.16,1,0.3,1) both; }

function buildCSV(store, lang) {
  const t = window.makeT(lang);
  const moodLabel = v => {
    const m = (window.MOODS || []).find(x => x.value === v);
    return m ? t(m.key) : "";
  };
  const head = ["Päivä", "Tyyppi", "Kuvaus", "Energia (kcal)", "Kesto (min)", "Askeleet", "Fiilis"];
  const esc = v => {
    const s = String(v == null ? "" : v);
    return /[",;\n]/.test(s) ? '"' + s.replace(/"/g, '""') + '"' : s;
  };
  const rows = [head];
  const keys = Object.keys(store.state.days).sort();
  keys.forEach(k => {
    const d = store.state.days[k];
    (d.meals || []).forEach(m => rows.push([k, "Ateria", m.text || "", m.kcal || "", "", "", ""]));
    (d.workouts || []).forEach(w => rows.push([k, "Harjoitus", w.name || "", w.kcal || "", w.mins || "", "", ""]));
    if (d.steps || d.mood) rows.push([k, "Päivä", "", "", "", d.steps || "", moodLabel(d.mood)]);
  });
  return "\uFEFF" + rows.map(r => r.map(esc).join(";")).join("\r\n");
}

  sync_help:    { fi: "Eikö synkronointi toimi? Tarkista että osoite on julkinen ja sallii haun (CORS). Voit myös ladata esimerkkiohjelman alta.", en: "Sync not working? Make sure the URL is public and allows fetching (CORS). You can also load a sample programme below.", sv: "Fungerar inte synken? Kontrollera att URL:en är offentlig och tillåter hämtning (CORS). Du kan även ladda ett exempelprogram nedan." },
  program_active:{ fi: "Ohjelma aktiivinen", en: "Programme active", sv: "Program aktivt" },

  /* ravintohistoria — listattu */
  foodhist_recent: { fi: "Viimeksi syöty", en: "Recently eaten", sv: "Senast ätet" },
  foodhist_none:   { fi: "Ei vielä ateriakirjauksia.", en: "No meal entries yet.", sv: "Inga måltidsposter än." },
};

function makeT(lang) {
  const L = (lang === "en" || lang === "sv") ? lang : "fi";
  return function t(key, vars) {
    const entry = STR[key];
    let s = entry ? (entry[L] || entry.fi) : key;
    if (vars) for (const k in vars) s = s.replace(new RegExp("\\{" + k + "\\}", "g"), vars[k]);
    return s;
  };
}

/* viikonpäivät + kuukaudet kielikohtaisesti */
const DOW_SHORT = {
  fi: ["Ma","Ti","Ke","To","Pe","La","Su"],
  en: ["Mon","Tue","Wed","Thu","Fri","Sat","Sun"],
  sv: ["Mån","Tis","Ons","Tor","Fre","Lör","Sön"],
};
const DOW_LONG = {
  fi: ["sunnuntai","maanantai","tiistai","keskiviikko","torstai","perjantai","lauantai"],
  en: ["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"],
  sv: ["söndag","måndag","tisdag","onsdag","torsdag","fredag","lördag"],
};
const MONTHS = {
  fi: ["tammikuuta","helmikuuta","maaliskuuta","huhtikuuta","toukokuuta","kesäkuuta","heinäkuuta","elokuuta","syyskuuta","lokakuuta","marraskuuta","joulukuuta"],
  en: ["January","February","March","April","May","June","July","August","September","October","November","December"],
  sv: ["januari","februari","mars","april","maj","juni","juli","augusti","september","oktober","november","december"],
};
const MONTHS_SHORT = {
  fi: ["tammi","helmi","maalis","huhti","touko","kesä","heinä","elo","syys","loka","marras","joulu"],
  en: ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"],
  sv: ["jan","feb","mar","apr","maj","jun","jul","aug","sep","okt","nov","dec"],
};

function longDateL(lang, d = new Date()) {
  const L = DOW_LONG[lang] ? lang : "fi";
  const dow = DOW_LONG[L][d.getDay()];
  const cap = dow.charAt(0).toUpperCase() + dow.slice(1);
  if (L === "en") return `${cap}, ${MONTHS[L][d.getMonth()]} ${d.getDate()}`;
  if (L === "sv") return `${cap} ${d.getDate()} ${MONTHS[L][d.getMonth()]}`;
  return `${cap} ${d.getDate()}. ${MONTHS[L][d.getMonth()]}`;
}
function localeFor(lang) { return lang === "en" ? "en-GB" : lang === "sv" ? "sv-SE" : "fi-FI"; }
function numFmt(lang, n) { return Number(n).toLocaleString(localeFor(lang)); }

Object.assign(window, { STR, makeT, DOW_SHORT, DOW_LONG, MONTHS, MONTHS_SHORT, longDateL, localeFor, numFmt });

</script>

<script type="text/babel">
/* Vire-app — tilamalli + localStorage + päivä/viikko-apurit.
   Kaikki alkaa nollasta. v0.1.1: asetukset, kieli, teema, fiilis, pilvisynkkaus. */

const STORE_KEY = "vire.app.v1";
const APP_VERSION = "0.1.1";

/* ---------- päivä & viikko ---------- */
function dateKey(d = new Date()) {
  const y = d.getFullYear(), m = String(d.getMonth() + 1).padStart(2, "0"), day = String(d.getDate()).padStart(2, "0");
  return `${y}-${m}-${day}`;
}
function parseKey(key) { const [y, m, d] = key.split("-").map(Number); return new Date(y, m - 1, d); }
function isoWeek(d = new Date()) {
  const t = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()));
  const dayNum = (t.getUTCDay() + 6) % 7;
  t.setUTCDate(t.getUTCDate() - dayNum + 3);
  const firstThu = new Date(Date.UTC(t.getUTCFullYear(), 0, 4));
  const firstDayNum = (firstThu.getUTCDay() + 6) % 7;
  firstThu.setUTCDate(firstThu.getUTCDate() - firstDayNum + 3);
  return 1 + Math.round((t - firstThu) / (7 * 24 * 3600 * 1000));
}
function weekDays(ref = new Date()) {
  const dow = (ref.getDay() + 6) % 7;
  const monday = new Date(ref); monday.setDate(ref.getDate() - dow);
  return Array.from({ length: 7 }, (_, i) => { const d = new Date(monday); d.setDate(monday.getDate() + i); return d; });
}
function shortDate(d, lang) {
  if (lang === "en") return `${d.getMonth() + 1}/${d.getDate()}`;
  return `${d.getDate()}.${d.getMonth() + 1}.`;
}

/* ---------- oletustila (tyhjä) ---------- */
function freshState() {
  return {
    onboarded: false,
    licensed: false,
    licenseEmail: "",
    version: APP_VERSION,
    profile: { name: "", since: dateKey(), photo: "", email: "", age: "", height: "", weight: "" },
    goals: { steps: 8000, energy: 2000, activeMin: 30, water: 8 },
    settings: {
      lang: "fi",
      theme: "light",
      hideRings: false,
      notif: { workout: true, meal: true, weekly: true, mood: false },
      syncUrl: "",
    },
    programs: { workouts: null, nutrition: null, syncedAt: null },
    messages: [],
    days: {}, // 'YYYY-MM-DD' -> { steps, water, meals:[], workouts:[], mood }
  };
}
function freshDay() { return { steps: 0, water: 0, meals: [], workouts: [], mood: null }; }

function loadState() {
  try {
    const raw = localStorage.getItem(STORE_KEY);
    if (!raw) return freshState();
    const saved = JSON.parse(raw);
    const base = freshState();
    return {
      ...base, ...saved,
      profile: { ...base.profile, ...(saved.profile || {}) },
      goals: { ...base.goals, ...(saved.goals || {}) },
      messages: saved.messages || base.messages,
      settings: { ...base.settings, ...(saved.settings || {}), notif: { ...base.settings.notif, ...((saved.settings || {}).notif || {}) } },
      programs: { ...base.programs, ...(saved.programs || {}) },
      version: APP_VERSION,
    };
  } catch (e) { return freshState(); }
}
function saveState(s) { try { localStorage.setItem(STORE_KEY, JSON.stringify(s)); } catch (e) {} }

/* ---------- React-hook ---------- */
function useVireStore() {
  const [state, setState] = React.useState(loadState);
  React.useEffect(() => { saveState(state); }, [state]);

  /* teema + kieli dokumenttiin */
  React.useEffect(() => {
    document.documentElement.setAttribute("data-theme", state.settings.theme === "dark" ? "dark" : "light");
    document.documentElement.setAttribute("lang", state.settings.lang);
  }, [state.settings.theme, state.settings.lang]);

  const patchDayFn = (s, key, fn) => {
    const cur = s.days[key] || freshDay();
    return { ...s, days: { ...s.days, [key]: fn(cur) } };
  };

  const api = React.useMemo(() => ({
    state,
    version: APP_VERSION,
    completeOnboarding(profile, goals) {
      setState((s) => ({ ...s, onboarded: true, profile: { ...s.profile, ...profile, since: dateKey() }, goals: { ...s.goals, ...goals } }));
    },
    setLicensed(email) { setState((s) => ({ ...s, licensed: true, licenseEmail: email || s.licenseEmail, profile: { ...s.profile, email: email || s.profile.email } })); },
    clearPrograms() { setState((s) => ({ ...s, programs: { workouts: null, nutrition: null, syncedAt: null } })); },
    sendMessage(text) {
      const now = Date.now();
      setState((s) => ({ ...s, messages: [...(s.messages || []), { id: now, from: "me", text, t: now }, { id: now + 1, from: "coach", text: "__auto__", t: now + 1 }] }));
    },
    updateProfile(patch) { setState((s) => ({ ...s, profile: { ...s.profile, ...patch } })); },
    updateGoals(patch) { setState((s) => ({ ...s, goals: { ...s.goals, ...patch } })); },
    updateSettings(patch) { setState((s) => ({ ...s, settings: { ...s.settings, ...patch } })); },
    updateNotif(patch) { setState((s) => ({ ...s, settings: { ...s.settings, notif: { ...s.settings.notif, ...patch } } })); },
    setPrograms(programs) { setState((s) => ({ ...s, programs: { ...programs, syncedAt: Date.now() } })); },
    day(key = dateKey()) { return state.days[key] || freshDay(); },
    addSteps(key, n) { setState((s) => patchDayFn(s, key, (c) => ({ ...c, steps: Math.max(0, c.steps + n) }))); },
    setSteps(key, n) { setState((s) => patchDayFn(s, key, (c) => ({ ...c, steps: Math.max(0, n) }))); },
    setWater(key, n) { setState((s) => patchDayFn(s, key, (c) => ({ ...c, water: Math.max(0, n) }))); },
    setMood(key, mood) { setState((s) => patchDayFn(s, key, (c) => ({ ...c, mood }))); },
    addMeal(key, meal) { setState((s) => patchDayFn(s, key, (c) => ({ ...c, meals: [...c.meals, { id: Date.now() + Math.random(), ...meal }] }))); },
    removeMeal(key, id) { setState((s) => patchDayFn(s, key, (c) => ({ ...c, meals: c.meals.filter((m) => m.id !== id) }))); },
    addWorkout(key, w) { setState((s) => patchDayFn(s, key, (c) => ({ ...c, workouts: [...c.workouts, { id: Date.now() + Math.random(), ...w }] }))); },
    removeWorkout(key, id) { setState((s) => patchDayFn(s, key, (c) => ({ ...c, workouts: c.workouts.filter((w) => w.id !== id) }))); },
    resetAll() { const fresh = freshState(); saveState(fresh); setState(fresh); },
  }), [state]);

  return api;
}

/* ---------- Oletus-viikko-ohjelma (paikkamerkki personoidulle ohjelmalle) ----------
   dow: 0 = maanantai … 6 = sunnuntai. Yksi lepopäivä. */
const DEFAULT_PLAN = [
  { dow: 0, icon: "dumbbell",   mins: 40, name: { fi: "Voima — alavartalo", en: "Strength — lower body", sv: "Styrka — underkropp" }, focus: { fi: "Kyykky, askelkyykky, lankku", en: "Squat, lunge, plank", sv: "Knäböj, utfall, planka" } },
  { dow: 1, icon: "footprints", mins: 30, name: { fi: "Palauttava kävely", en: "Recovery walk", sv: "Återhämtningspromenad" }, focus: { fi: "Reipas kävely ulkona", en: "Brisk walk outdoors", sv: "Rask promenad ute" } },
  { dow: 2, icon: "dumbbell",   mins: 40, name: { fi: "Voima — ylävartalo", en: "Strength — upper body", sv: "Styrka — överkropp" }, focus: { fi: "Punnerrus, soutu, olkapäät", en: "Push-up, row, shoulders", sv: "Armhävning, rodd, axlar" } },
  { dow: 3, icon: "heart",      mins: 25, name: { fi: "Liikkuvuus & venyttely", en: "Mobility & stretch", sv: "Rörlighet & stretch" }, focus: { fi: "Lonkat, selkä, hartiat", en: "Hips, back, shoulders", sv: "Höfter, rygg, axlar" } },
  { dow: 4, icon: "activity",   mins: 35, name: { fi: "Intervallit", en: "Intervals", sv: "Intervaller" }, focus: { fi: "6 × 1 min reipasta + palautus", en: "6 × 1 min hard + rest", sv: "6 × 1 min hårt + vila" } },
  { dow: 5, icon: "footprints", mins: 50, name: { fi: "Pitkä lenkki", en: "Long walk/run", sv: "Lång tur" }, focus: { fi: "Rauhallinen pidempi lenkki", en: "Easy longer session", sv: "Lugn längre tur" } },
  { dow: 6, icon: null,         mins: 0,  name: { fi: "Lepopäivä", en: "Rest day", sv: "Vilodag" }, focus: { fi: "Palaudu — kevyt liikkuvuus sallittu", en: "Recover — light mobility ok", sv: "Återhämta — lätt rörlighet ok" } },
];

/* Seuraava suunniteltu sessio etusivun agendaa varten.
   Käyttää synkronoitua ohjelmaa jos saatavilla, muuten oletusohjelmaa. */
function nextSession(store, lang = "fi") {
  const today = new Date();
  const todayDow = (today.getDay() + 6) % 7;
  // jos tämän päivän sessio on jo treeni-päivä eikä lepo, näytä se; muuten seuraava treenipäivä
  for (let i = 0; i < 7; i++) {
    const dow = (todayDow + i) % 7;
    const p = DEFAULT_PLAN.find((x) => x.dow === dow);
    if (!p) continue;
    const isRest = !p.icon || p.mins === 0;
    if (i === 0 && isRest) {
      // tänään lepo: tarjoa se sellaisenaan
      return { ...p, when: 0, isRest, name: p.name[lang] || p.name.fi, focus: p.focus[lang] || p.focus.fi };
    }
    if (isRest) continue;
    return { ...p, when: i, isRest: false, name: p.name[lang] || p.name.fi, focus: p.focus[lang] || p.focus.fi };
  }
  const p = DEFAULT_PLAN[0];
  return { ...p, when: 0, isRest: false, name: p.name[lang] || p.name.fi, focus: p.focus[lang] || p.focus.fi };
}

/* päivän johdetut summat */
function dayTotals(day) {
  const energy = day.meals.reduce((a, m) => a + (Number(m.kcal) || 0), 0);
  const activeMin = day.workouts.reduce((a, w) => a + (Number(w.mins) || 0), 0);
  return { energy, activeMin, steps: day.steps || 0, water: day.water || 0 };
}

/* ---------- pilvisynkronointi (CSV tai JSON URL) ----------
   Yrittää hakea ohjelmat annetusta osoitteesta. Palauttaa { ok, programs?, error? }.
   Tukee: JSON ({workouts, nutrition}) tai yksinkertainen CSV (otsikkorivi + rivit). */
async function fetchPrograms(url) {
  if (!url) return { ok: false, error: "no-url" };
  try {
    const res = await fetch(url, { cache: "no-store" });
    if (!res.ok) return { ok: false, error: "http-" + res.status };
    const text = await res.text();
    let programs;
    if (text.trim().startsWith("{") || text.trim().startsWith("[")) {
      const data = JSON.parse(text);
      programs = { workouts: data.workouts || data, nutrition: data.nutrition || null };
    } else {
      // CSV → riveiksi
      const rows = text.trim().split(/\r?\n/).map((r) => r.split(","));
      const head = rows.shift() || [];
      const items = rows.map((r) => Object.fromEntries(head.map((h, i) => [h.trim(), (r[i] || "").trim()])));
      programs = { workouts: items, nutrition: null };
    }
    return { ok: true, programs };
  } catch (e) {
    return { ok: false, error: String(e && e.message || e) };
  }
}

Object.assign(window, {
  useVireStore, dayTotals, dateKey, parseKey, isoWeek, weekDays, shortDate, freshDay, fetchPrograms, APP_VERSION,
  DEFAULT_PLAN, nextSession,
});

</script>

<script type="text/babel">
/* Vire-app — kehyksetön kuori: ikoni, runko, navigaatiot, hero, dropdown, valikko. */

function L({ name, size = 22, color, strokeWidth }) {
  const ref = React.useRef(null);
  React.useEffect(() => {
    if (!ref.current || !window.lucide) return;
    ref.current.innerHTML = "";
    const i = document.createElement("i");
    i.setAttribute("data-lucide", name);
    ref.current.appendChild(i);
    const attrs = { width: size, height: size };
    if (strokeWidth) attrs["stroke-width"] = strokeWidth;
    window.lucide.createIcons({ attrs, root: ref.current });
  }, [name, size, strokeWidth]);
  return <span ref={ref} style={{ display: "inline-flex", color }}></span>;
}

/* Vire-logomerkki inline-SVG:nä (toimii myös niputetussa tiedostossa). */
function VireMark({ size = 26, color = "var(--brand-500)", dot = "var(--apricot-500)" }) {

    <svg width={size} height={size} viewBox="0 0 48 48" fill="none" role="img" aria-label="Vire">

      <circle cx="35.5" cy="12.5" r="3.6" fill={dot}></circle>

}

/* Sisältöalue. Reilusti tilaa alalaitaan (liukuva alapalkki + hengitystila).
   immersive = oma tausta (etusivun hero), muutoin vaalea surface-page. */
function AppFrame({ children, bottom, immersive }) {

/* ---------- Liukulasinen alapalkki (liquid glass) ---------- */

/* ---------- Hampurilaispainike (kolme viivaa, oikea ylälaita) ---------- */
function HamburgerButton({ onClick, light }) {

}

/* ---------- Etusivun hero: taustakuva blurautuu alas ja tasoittuu teal-väriin ---------- */
function HeroBg() {
  const ref = React.useRef(null);
  React.useEffect(() => {
    const el = ref.current;
    if (!el) return;
    let raf = 0;
    const onScroll = () => {
      if (raf) return;
      raf = requestAnimationFrame(() => {
        raf = 0;
        const y = window.scrollY || document.documentElement.scrollTop || 0;
        el.style.transform = `translateY(${y * 0.32}px)`;
        el.style.opacity = String(Math.max(0, 1 - y / 460));
      });
    };
    window.addEventListener("scroll", onScroll, { passive: true });
    return () => window.removeEventListener("scroll", onScroll);
  }, []);
  return (
    <div style={{ position: "absolute", inset: 0, zIndex: 0, overflow: "hidden", pointerEvents: "none" }}>
      <div ref={ref} style={{ position: "absolute", top: 0, left: 0, right: 0, height: 540, willChange: "transform, opacity" }}>
        {/* terävä kuva ylhäällä */}
        <div className="vire-hero-bg" style={{ position: "absolute", inset: 0 }}></div>
        {/* blurautuva kopio (maskattu alaspäin) */}
        <div className="vire-hero-bg" style={{
          position: "absolute", inset: 0,
          filter: "blur(18px)", transform: "scale(1.06)",
          WebkitMaskImage: "linear-gradient(to bottom, transparent 32%, #000 64%)", maskImage: "linear-gradient(to bottom, transparent 32%, #000 64%)",
        }}></div>
        {/* tasoitus teal-väriin + yläosan tummennus tekstille */}
        <div style={{ position: "absolute", inset: 0, background: "linear-gradient(to bottom, rgba(24,14,16,0.46) 0%, rgba(24,14,16,0.06) 26%, rgba(74,56,59,0) 50%, var(--home-base, #4A383B) 92%)" }}></div>
      </div>
    </div>
  );
}

/* Puolikaari-mittari (tavoite-edistyminen). value 0..1 */
function GaugeSemi({ value, size = 200, stroke = 16, track = "rgba(255,255,255,0.22)", fill = "#fff", children }) {
  const v = Math.max(0, Math.min(1, value || 0));
  const r = (size - stroke) / 2;
  const cx = size / 2, cy = size / 2;
  const len = Math.PI * r;
  const d = `M ${stroke / 2} ${cy} A ${r} ${r} 0 0 1 ${size - stroke / 2} ${cy}`;
  return (
    <div style={{ position: "relative", width: size, height: size / 2 + stroke / 2 + 6 }}>
      <svg width={size} height={size / 2 + stroke} style={{ display: "block", overflow: "visible" }}>
        <path d={d} fill="none" stroke={track} strokeWidth={stroke} strokeLinecap="round" />
        <path d={d} fill="none" stroke={fill} strokeWidth={stroke} strokeLinecap="round"
          strokeDasharray={len} strokeDashoffset={len * (1 - v)}
          style={{ transition: "stroke-dashoffset 1s var(--ease-out)" }} />
      </svg>
      <div style={{ position: "absolute", left: 0, right: 0, bottom: 4, display: "flex", flexDirection: "column", alignItems: "center" }}>
        {children}
      </div>
    </div>
  );
}

/* Tavallinen sivuotsikko (alasivut). onMenu lisää hampurilaisen oikeaan laitaan. */
function PageHeader({ title, onBack, right, onMenu }) {
  const menuEl = onMenu ? <HamburgerButton onClick={onMenu} /> : null;
  return (
    <div style={{ paddingTop: "calc(env(safe-area-inset-top) + 18px)" }}>

/* ---------- Liukuva valikkolaatikko (hampurilaisesta) ---------- */
function MenuDrawer({ open, onClose, items, footer, header }) {
  React.useEffect(() => {
    if (!open) return;
    const h = (e) => { if (e.key === "Escape") onClose(); };
    document.addEventListener("keydown", h);
    return () => document.removeEventListener("keydown", h);
  }, [open, onClose]);
  return (
    <div aria-hidden={!open} style={{ position: "fixed", inset: 0, zIndex: 80, pointerEvents: open ? "auto" : "none" }}>
      <div onClick={onClose} style={{
        position: "absolute", inset: 0, background: "var(--surface-overlay)",
        opacity: open ? 1 : 0, transition: "opacity .3s var(--ease-out)",
      }}></div>
      <div style={{
        position: "absolute", top: 0, right: 0, bottom: 0, width: "min(82%, 360px)",

  );
}

function EmptyState({ icon, title, body, action }) {
  const { Card } = window.VS;

      {action}
    </Card>
  );
}

/* Kevyt dropdown-valikko (oma, ei natiivi). options = [{value,label,icon?}] */
function Dropdown({ value, options, onChange, placeholder, icon }) {
  const [open, setOpen] = React.useState(false);
  const ref = React.useRef(null);
  React.useEffect(() => {
    const h = (e) => { if (ref.current && !ref.current.contains(e.target)) setOpen(false); };
    document.addEventListener("mousedown", h);
    return () => document.removeEventListener("mousedown", h);
  }, []);
  const sel = options.find((o) => o.value === value);
  return (
    <div ref={ref} style={{ position: "relative" }}>
      <button onClick={() => setOpen((v) => !v)} style={{
        width: "100%", boxSizing: "border-box", display: "flex", alignItems: "center", gap: 10,
        padding: "12px 14px", borderRadius: "var(--radius-md)", border: "1px solid var(--border-default)",
        background: "var(--surface-card)", cursor: "pointer", fontFamily: "var(--font-sans)", textAlign: "left",
        color: sel ? "var(--text-primary)" : "var(--text-muted)", fontSize: 15,
      }}>
        {icon || (sel && sel.icon) ? <span style={{ color: "var(--brand-500)", display: "inline-flex" }}>{sel && sel.icon ? sel.icon : icon}</span> : null}
        <span style={{ flex: 1, fontWeight: sel ? 600 : 500 }}>{sel ? sel.label : (placeholder || "")}</span>
        <L name={open ? "chevron-up" : "chevron-down"} size={19} color="var(--ink-400)" />
      </button>
      {open ? (
        <div style={{
          position: "absolute", top: "calc(100% + 6px)", left: 0, right: 0, zIndex: 40,
          background: "var(--surface-card)", borderRadius: "var(--radius-md)", border: "1px solid var(--border-subtle)",
          boxShadow: "var(--shadow-lg)", overflow: "hidden", padding: 6,
        }}>
          {options.map((o) => (
            <button key={o.value} onClick={() => { onChange(o.value); setOpen(false); }} style={{
              width: "100%", display: "flex", alignItems: "center", gap: 10, padding: "11px 12px", border: "none",
              background: o.value === value ? "var(--brand-50)" : "transparent", cursor: "pointer", borderRadius: "var(--radius-sm)",
              fontFamily: "var(--font-sans)", fontSize: 15, fontWeight: o.value === value ? 700 : 600,
              color: o.value === value ? "var(--brand-700)" : "var(--text-primary)", textAlign: "left",
            }}>
              {o.icon ? <span style={{ display: "inline-flex", color: o.value === value ? "var(--brand-600)" : "var(--ink-500)" }}>{o.icon}</span> : null}
              <span style={{ flex: 1 }}>{o.label}</span>
              {o.value === value ? <L name="check" size={17} color="var(--brand-600)" /> : null}
            </button>
          ))}
        </div>
      ) : null}
    </div>
  );
}

/* Section-otsikko listoille */
function SectionLabel({ children, style }) {
  return <div style={{ fontSize: 12, fontWeight: 700, letterSpacing: ".07em", textTransform: "uppercase", color: "var(--text-muted)", margin: "0 4px 10px", ...style }}>{children}</div>;
}

Object.assign(window, { L, VireMark, AppFrame, BottomNav, HamburgerButton, HeroBg, GaugeSemi, MenuDrawer, PageHeader, EmptyState, Dropdown, SectionLabel });

</script>

const stepLabel = { fontSize: 13, fontWeight: 700, letterSpacing: ".07em", textTransform: "uppercase", color: "var(--brand-600)", marginBottom: 12 };

function GoalRow({ icon, tint, label, unit, value, step, min, onChange, lang }) {

    <button onClick={fn} style={{ width: 38, height: 38, borderRadius: 11, border: "1px solid var(--border-default)", background: "var(--surface-card)", cursor: "pointer", display: "grid", placeItems: "center", color: "var(--ink-600)", flexShrink: 0 }}>
