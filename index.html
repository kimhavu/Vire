          <div style={{ display: "flex", gap: 8 }}>
            <input type="number" inputMode="numeric" placeholder={t("set_value")} value={stepInput} onChange={(e) => setStepInput(e.target.value)}
              style={inputStyle} />
            <window.VS.Button variant="secondary" size="sm" disabled={stepInput === ""} onClick={() => { store.setSteps(key, Math.round(Number(stepInput) || 0)); setStepInput(""); }}>{t("set_btn")}</window.VS.Button>
          </div>
          <div style={{ fontSize: 11.5, color: "var(--text-muted)", marginTop: 10, lineHeight: 1.45 }}>{t("steps_note")}</div>
        </Card>

        {/* päivän ateriat */}
        <div>
          <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", margin: "0 4px 10px" }}>
            <SectionLabel style={{ margin: 0, color: "rgba(255,255,255,0.62)" }}>{t("todays_meals")}</SectionLabel>
            <button onClick={() => onGo("ravinto")} style={linkBtnLight}>{t("view_all")}</button>
          </div>
          <Card padding="sm" style={{ padding: 8 }}>
            {day.meals.length === 0 ? (
              <Empty t={t} icon="utensils" label={t("no_meals_today")} onAdd={() => onGo("ravinto")} />
            ) : (
              <div style={{ display: "flex", flexDirection: "column" }}>
                {day.meals.slice(0, 4).map((m, i) => (
                  <div key={m.id} style={{ display: "flex", alignItems: "center", gap: 12, padding: "10px 8px", borderBottom: i < Math.min(day.meals.length, 4) - 1 ? "1px solid var(--border-subtle)" : "none" }}>
                    <div style={miniChip("var(--apricot-100)", "var(--apricot-700)")}><L name="utensils" size={17} /></div>
                    <div style={{ flex: 1, minWidth: 0, fontSize: 14.5, fontWeight: 600, whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>{m.text}</div>
                    {m.kcal ? <span style={{ fontSize: 13, fontWeight: 700, color: "var(--text-secondary)", fontVariantNumeric: "tabular-nums" }}>{m.kcal} kcal</span> : null}
                  </div>
                ))}
              </div>
            )}
          </Card>
        </div>

        {/* päivän harjoitukset */}
        <div>
          <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", margin: "0 4px 10px" }}>
            <SectionLabel style={{ margin: 0, color: "rgba(255,255,255,0.62)" }}>{t("todays_workouts")}</SectionLabel>
            <button onClick={() => onGo("liike")} style={linkBtnLight}>{t("view_all")}</button>
          </div>
          <Card padding="sm" style={{ padding: 8 }}>
            {day.workouts.length === 0 ? (
              <Empty t={t} icon="dumbbell" label={t("no_workouts_today")} onAdd={() => onGo("liike")} />
            ) : (
              <div style={{ display: "flex", flexDirection: "column" }}>
                {day.workouts.slice(0, 4).map((w, i) => (
                  <div key={w.id} style={{ display: "flex", alignItems: "center", gap: 12, padding: "10px 8px", borderBottom: i < Math.min(day.workouts.length, 4) - 1 ? "1px solid var(--border-subtle)" : "none" }}>
                    <div style={miniChip("var(--sage-100)", "var(--sage-700)")}><L name="activity" size={17} /></div>
                    <div style={{ flex: 1, minWidth: 0 }}>
                      <div style={{ fontSize: 14.5, fontWeight: 600, whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>{w.name}</div>
                    </div>
                    <span style={{ fontSize: 13, fontWeight: 700, color: "var(--text-secondary)", fontVariantNumeric: "tabular-nums" }}>{w.mins} {t("u_min")}</span>
                  </div>
                ))}
              </div>
            )}
          </Card>
        </div>

        {allZero ? (
          <Card soft padding="md" style={{ display: "flex", alignItems: "center", gap: 13 }}>
            <div style={{ width: 42, height: 42, borderRadius: 13, background: "var(--surface-card)", color: "var(--brand-600)", display: "grid", placeItems: "center", boxShadow: "var(--shadow-sm)", flexShrink: 0 }}>
              <L name="sparkles" size={21} />
            </div>
            <div style={{ fontSize: 14, color: "var(--text-secondary)", lineHeight: 1.45 }}>{t("fresh_start")}</div>
          </Card>
        ) : null}
      </div>
    </div>
  );
}

function Empty({ icon, label, onAdd, t }) {
  const { L } = window;
  return (
    <button onClick={onAdd} style={{
      width: "100%", display: "flex", alignItems: "center", gap: 12, padding: "14px 10px", border: "none",
      background: "transparent", cursor: "pointer", fontFamily: "var(--font-sans)", textAlign: "left",
    }}>
      <div style={miniChip("var(--ink-100)", "var(--ink-400)")}><L name={icon} size={17} /></div>
      <span style={{ flex: 1, fontSize: 14, color: "var(--text-muted)", fontWeight: 500 }}>{label}</span>
      <L name="plus-circle" size={22} color="var(--brand-500)" />
    </button>
  );
}

function MoodField({ store, dayKey, t, lang }) {
  const { Card } = window.VS;
  const { L, Dropdown } = window;
  const day = store.day(dayKey);
  const opts = MOODS.map((m) => ({ value: m.value, label: t(m.key), icon: <L name={m.icon} size={18} /> }));

  const recent = window.weekDays(window.parseKey(dayKey)).map((d) => {
    const dd = store.day(window.dateKey(d));
    return { d, mood: dd.mood };
  });

  return (
    <Card padding="md">
      <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 12 }}>
        <div style={{ width: 38, height: 38, borderRadius: 12, background: "var(--lilac-100)", color: "var(--lilac-500)", display: "grid", placeItems: "center" }}>
          <L name="heart" size={20} />
        </div>
        <div style={{ flex: 1 }}>
          <div style={{ fontWeight: 700, fontSize: 15 }}>{t("mood_title")}</div>
          <div style={{ fontSize: 12.5, color: "var(--text-muted)" }}>{t("mood_sub")}</div>
        </div>
      </div>
      <Dropdown value={day.mood} options={opts} placeholder={t("mood_pick")} icon={<L name="smile" size={18} />} onChange={(v) => store.setMood(dayKey, v)} />
      <div style={{ marginTop: 14 }}>
        <div style={{ fontSize: 11, fontWeight: 700, letterSpacing: ".06em", textTransform: "uppercase", color: "var(--text-muted)", marginBottom: 8 }}>{t("mood_history")}</div>
        <div style={{ display: "flex", gap: 6 }}>
          {recent.map((r, i) => {
            const m = MOODS.find((x) => x.value === r.mood);
            const isToday = window.dateKey(r.d) === dayKey;
            return (
              <div key={i} style={{ flex: 1, display: "flex", flexDirection: "column", alignItems: "center", gap: 5 }}>
                <div style={{
                  width: "100%", aspectRatio: "1", maxWidth: 38, borderRadius: 11, display: "grid", placeItems: "center",
                  background: m ? "color-mix(in srgb, " + m.color + " 16%, transparent)" : "var(--surface-sunken)",
                  border: isToday ? "1.5px solid var(--brand-300)" : "1.5px solid transparent",
                }}>
                  {m ? <L name={m.icon} size={18} color={m.color} /> : <span style={{ width: 5, height: 5, borderRadius: 99, background: "var(--ink-300)" }}></span>}
                </div>
                <span style={{ fontSize: 10, color: "var(--text-muted)", fontWeight: 600 }}>{window.DOW_SHORT[lang][i]}</span>
              </div>
            );
          })}
        </div>
      </div>
    </Card>
  );
}

const inputStyle = {
  flex: 1, height: 40, borderRadius: "var(--radius-md)", border: "1px solid var(--border-default)",
  padding: "0 14px", fontFamily: "var(--font-sans)", fontSize: 15, color: "var(--text-primary)", background: "var(--surface-card)",
};
const linkBtnLight = { border: "none", background: "rgba(255,255,255,0.16)", color: "#fff", fontWeight: 700, fontSize: 12.5, cursor: "pointer", fontFamily: "var(--font-sans)", padding: "5px 12px", borderRadius: 999 };
const miniChip = (bg, fg) => ({ width: 34, height: 34, borderRadius: 10, background: bg, color: fg, display: "grid", placeItems: "center", flexShrink: 0 });

Object.assign(window, { TodayScreen, MOODS });

</script>

<script type="text/babel">
/* Vire-app — Liike-moduuli. Alanavigaatio: Koti / Harjoitteet / Viikko-ohjelma. */

/* Esimerkkiharjoitteet (ei dataa — paikkamerkki personoidulle ohjelmalle). */
const SAMPLE_EXERCISES = [
  { name: { fi: "Kyykky", en: "Squat", sv: "Knäböj" }, sets: "4 × 10", tone: "duotone", dur: "0:46" },
  { name: { fi: "Punnerrus", en: "Push-up", sv: "Armhävning" }, sets: "3 × 12", tone: "sage", dur: "0:38" },
  { name: { fi: "Lankku", en: "Plank", sv: "Planka" }, sets: "3 × 45 s", tone: "warm", dur: "0:33" },
];

function VideoField({ tone = "duotone", duration = "0:45", caption }) {
  const { L } = window;
  const grads = {
    natural: "linear-gradient(135deg, #6E8C7C 0%, #9FB6A8 100%)",
    duotone: "linear-gradient(140deg, #3C4A93 0%, #6B7FD7 100%)",
    warm: "linear-gradient(135deg, #B5704A 0%, #E8A87C 100%)",
    sage: "linear-gradient(135deg, #4E7C66 0%, #88B89C 100%)",
  };
  const [playing, setPlaying] = React.useState(false);
  return (
    <div onClick={() => setPlaying(true)} style={{ position: "relative", width: "100%", aspectRatio: "16 / 9", borderRadius: 14, overflow: "hidden", background: grads[tone], cursor: "pointer" }}>
      <div style={{ position: "absolute", inset: 0, opacity: 0.32, backgroundImage: "radial-gradient(rgba(255,255,255,0.18) 1px, transparent 1px)", backgroundSize: "4px 4px" }}></div>
      <div style={{ position: "absolute", inset: 0, background: "linear-gradient(to top, rgba(0,0,0,0.3), rgba(0,0,0,0) 55%)" }}></div>
      <div style={{ position: "absolute", inset: 0, display: "grid", placeItems: "center" }}>
        <div style={{ width: 56, height: 56, borderRadius: "50%", background: "rgba(255,255,255,0.92)", display: "grid", placeItems: "center", boxShadow: "0 6px 20px rgba(0,0,0,0.25)" }}>
          <L name={playing ? "loader" : "play"} size={23} color="var(--brand-600)" strokeWidth={2.4} />
        </div>
      </div>
      <div style={{ position: "absolute", left: 12, right: 12, bottom: 12, display: "flex", alignItems: "center", justifyContent: "space-between" }}>
        <span style={{ fontSize: 12.5, fontWeight: 700, color: "#fff", display: "inline-flex", alignItems: "center", gap: 6 }}><L name="video" size={15} color="#fff" /> {caption}</span>
        <span style={{ fontSize: 12, fontWeight: 700, color: "#fff", background: "rgba(0,0,0,0.4)", padding: "3px 8px", borderRadius: 999, fontVariantNumeric: "tabular-nums" }}>{duration}</span>
      </div>
    </div>
  );
}

function LiikeModule({ store, onHome, t, lang, onMenu }) {
  const { AppFrame, BottomNav } = window;
  const [sub, setSub] = React.useState("harjoitteet");
  const [refDate, setRefDate] = React.useState(new Date());

  const items = [
    { id: "koti", label: t("nav_home"), icon: "house", onClick: onHome },
    { id: "harjoitteet", label: t("nav_workouts"), icon: "dumbbell", active: sub === "harjoitteet", onClick: () => setSub("harjoitteet") },
    { id: "viikko", label: t("nav_week"), icon: "calendar-days", active: sub === "viikko", onClick: () => setSub("viikko") },
  ];

  const screen = sub === "viikko"
    ? <ViikkoOhjelma store={store} refDate={refDate} setRefDate={setRefDate} t={t} lang={lang} onMenu={onMenu} onOpenDay={(d) => { setRefDate(d); setSub("harjoitteet"); }} />
    : <Harjoitteet store={store} refDate={refDate} t={t} lang={lang} onMenu={onMenu} />;

  return <AppFrame bottom={<BottomNav items={items} />}>{screen}</AppFrame>;
}

function Harjoitteet({ store, refDate, t, lang, onMenu }) {
  const { Card, Button, Badge, Input } = window.VS;
  const { L, PageHeader, EmptyState, SectionLabel } = window;
  const key = window.dateKey(refDate);
  const day = store.day(key);
  const isToday = key === window.dateKey();
  const [form, setForm] = React.useState(null);

  const save = () => {
    if (!form.name.trim()) return;
    store.addWorkout(key, { name: form.name.trim(), mins: Math.round(Number(form.mins) || 0), kcal: Math.round(Number(form.kcal) || 0) });
    setForm(null);
  };
  const totalMin = day.workouts.reduce((a, w) => a + (Number(w.mins) || 0), 0);
  const dateLabel = isToday ? t("nav_today") : `${window.DOW_SHORT[lang][(refDate.getDay() + 6) % 7]} ${window.shortDate(refDate, lang)}`;

  return (
    <div>
      <PageHeader title={t("move_title")} onMenu={onMenu} right={<Button variant="soft" size="sm" iconLeft={<L name="plus" size={16} />} onClick={() => setForm({ name: "", mins: "", kcal: "" })}>{t("log_btn")}</Button>} />
      <div style={{ padding: "0 20px", display: "flex", flexDirection: "column", gap: 16 }}>
        <div style={{ fontSize: 13, color: "var(--text-muted)", fontWeight: 600, margin: "-4px 4px 0" }}>{dateLabel} · {t("week_w")} {window.isoWeek(refDate)}</div>

        {day.workouts.length > 0 ? (
          <Card padding="md" style={{ display: "flex", alignItems: "center", gap: 14 }}>
            <div style={chip("var(--sage-100)", "var(--sage-700)", 46)}><L name="activity" size={23} /></div>
            <div style={{ flex: 1 }}>
              <div style={{ fontSize: 22, fontWeight: 800, fontVariantNumeric: "tabular-nums" }}>{totalMin} {t("u_min")}</div>
              <div style={{ fontSize: 13, color: "var(--text-muted)" }}>{day.workouts.length} {t("workouts_today_n")}</div>
            </div>
            <Badge tone="movement" dot>{t("logged_badge")}</Badge>
          </Card>
        ) : null}

        {form ? (
          <Card padding="md" style={{ display: "flex", flexDirection: "column", gap: 12 }}>
            <div style={{ fontWeight: 700, fontSize: 15 }}>{t("new_workout")}</div>
            <Input label={t("what_did_you_do")} placeholder={t("workout_ph")} value={form.name} onChange={(e) => setForm({ ...form, name: e.target.value })} autoFocus />
            <div style={{ display: "flex", gap: 10 }}>
              <Input label={t("dur_min")} type="number" placeholder="30" value={form.mins} onChange={(e) => setForm({ ...form, mins: e.target.value })} style={{ flex: 1 }} />
              <Input label={t("energy_kcal")} type="number" placeholder="—" value={form.kcal} onChange={(e) => setForm({ ...form, kcal: e.target.value })} style={{ flex: 1 }} optional={t("optional")} />
            </div>
            <div style={{ display: "flex", gap: 10 }}>
              <Button variant="ghost" onClick={() => setForm(null)}>{t("cancel")}</Button>
              <Button block onClick={save} disabled={!form.name.trim()}>{t("save")}</Button>
            </div>
          </Card>
        ) : null}

        {/* omat kirjaukset */}
        {day.workouts.length === 0 && !form ? (
          <EmptyState icon="dumbbell" title={t("no_entries")} body={t("log_workout_body")}
            action={<Button iconLeft={<L name="plus" size={17} />} onClick={() => setForm({ name: "", mins: "", kcal: "" })}>{t("log_workout")}</Button>} />
        ) : null}
        {day.workouts.length > 0 ? <SectionLabel>{t("my_workouts")}</SectionLabel> : null}
        {day.workouts.map((w) => (
          <Card key={w.id} flat style={{ display: "flex", alignItems: "center", gap: 14, padding: "12px 14px" }}>
            <div style={chip("var(--sage-100)", "var(--sage-700)", 40)}><L name="activity" size={20} /></div>
            <div style={{ flex: 1, minWidth: 0 }}>
              <div style={{ fontWeight: 700, fontSize: 15 }}>{w.name}</div>
              <div style={{ fontSize: 13, color: "var(--text-muted)" }}>{w.mins} {t("u_min")}{w.kcal ? ` · ${w.kcal} kcal` : ""}</div>
            </div>
            <button onClick={() => store.removeWorkout(key, w.id)} style={iconBtn}><L name="trash-2" size={18} /></button>
          </Card>
        ))}

        {/* esimerkkiohjelma + videoupotus */}
        <SectionLabel style={{ marginTop: 8 }}>{t("planned_workouts")}</SectionLabel>
        <div style={{ display: "flex", flexDirection: "column", gap: 14 }}>
          {SAMPLE_EXERCISES.map((ex, i) => (
            <Card key={i} padding="sm" style={{ padding: 12 }}>
              <VideoField tone={ex.tone} duration={ex.dur} caption={t("watch_technique")} />
              <div style={{ display: "flex", alignItems: "center", gap: 12, padding: "12px 4px 2px" }}>
                <div style={{ width: 26, height: 26, borderRadius: 8, background: "var(--brand-50)", color: "var(--brand-600)", display: "grid", placeItems: "center", fontSize: 13, fontWeight: 800, flexShrink: 0 }}>{i + 1}</div>
                <div style={{ flex: 1, minWidth: 0 }}>
                  <div style={{ fontWeight: 700, fontSize: 16 }}>{ex.name[lang] || ex.name.fi}</div>
                  <div style={{ fontSize: 13, color: "var(--text-muted)" }}>{ex.sets}</div>
                </div>
              </div>
            </Card>
          ))}
          <Card soft padding="md" style={{ display: "flex", alignItems: "center", gap: 12 }}>
            <L name="info" size={20} color="var(--brand-500)" />
            <div style={{ fontSize: 13, color: "var(--text-secondary)", lineHeight: 1.45 }}>{t("sample_note")}</div>
          </Card>
        </div>
      </div>
    </div>
  );
}

function ViikkoOhjelma({ store, refDate, setRefDate, onOpenDay, t, lang, onMenu }) {
  const { Card } = window.VS;
  const { L, PageHeader } = window;
  const days = window.weekDays(refDate);
  const wk = window.isoWeek(refDate);
  const todayKey = window.dateKey();
  const program = store.state.programs && Array.isArray(store.state.programs.workouts) ? store.state.programs.workouts : null;
  const planFor = (d) => {
    const dow = (d.getDay() + 6) % 7;
    const src = program && program.length && program[0] && program[0].dow !== undefined ? program : window.DEFAULT_PLAN;
    const e = src.find((x) => x.dow === dow);
    if (!e) return null;
    const nm = typeof e.name === "object" ? (e.name[lang] || e.name.fi) : e.name;
    return { name: nm, mins: e.mins, rest: !e.icon || e.mins === 0 };
  };
  const shift = (n) => { const d = new Date(refDate); d.setDate(d.getDate() + n * 7); setRefDate(d); };
  const monthRange = `${days[0].getDate()}.–${days[6].getDate()}.${days[6].getMonth() + 1}. ${days[6].getFullYear()}`;
  const totalMin = days.reduce((a, d) => a + store.day(window.dateKey(d)).workouts.reduce((x, w) => x + (Number(w.mins) || 0), 0), 0);
  const activeDays = days.filter((d) => store.day(window.dateKey(d)).workouts.length > 0).length;

  return (
    <div>
      <PageHeader title={t("week_plan_t")} onMenu={onMenu} />
      <div style={{ padding: "0 20px", display: "flex", flexDirection: "column", gap: 14 }}>
        <Card flat style={{ display: "flex", alignItems: "center", justifyContent: "space-between", padding: "12px 14px" }}>
          <button onClick={() => shift(-1)} style={navBtn}><L name="chevron-left" size={20} color="var(--ink-600)" /></button>
          <div style={{ textAlign: "center" }}>
            <div style={{ fontSize: 16, fontWeight: 800 }}>{t("week_w")} {wk}</div>
            <div style={{ fontSize: 12.5, color: "var(--text-muted)", fontWeight: 600 }}>{monthRange}</div>
          </div>
          <button onClick={() => shift(1)} style={navBtn}><L name="chevron-right" size={20} color="var(--ink-600)" /></button>
        </Card>

        <div style={{ display: "flex", gap: 10 }}>
          <Card padding="md" style={{ flex: 1, textAlign: "center" }}>
            <div style={{ fontSize: 22, fontWeight: 800 }}>{activeDays}</div>
            <div style={{ fontSize: 12, color: "var(--text-muted)", fontWeight: 600 }}>{t("active_days")}</div>
          </Card>
          <Card padding="md" style={{ flex: 1, textAlign: "center" }}>
            <div style={{ fontSize: 22, fontWeight: 800, fontVariantNumeric: "tabular-nums" }}>{totalMin}</div>
            <div style={{ fontSize: 12, color: "var(--text-muted)", fontWeight: 600 }}>{t("min_total")}</div>
          </Card>
        </div>

        <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
          {days.map((d, i) => {
            const dk = window.dateKey(d);
            const dd = store.day(dk);
            const isToday = dk === todayKey;
            const has = dd.workouts.length > 0;
            const mins = dd.workouts.reduce((a, w) => a + (Number(w.mins) || 0), 0);
            const pl = planFor(d);
            return (
              <Card key={i} flat interactive onClick={() => onOpenDay(d)} style={{
                display: "flex", alignItems: "center", gap: 14, padding: "12px 14px",
                border: isToday ? "1.5px solid var(--brand-300)" : "1px solid var(--border-subtle)",
                background: isToday ? "var(--brand-50)" : "var(--surface-card)",
              }}>
                <div style={{ width: 44, flexShrink: 0, textAlign: "center" }}>
                  <div style={{ fontSize: 13, fontWeight: 700, color: isToday ? "var(--brand-700)" : "var(--text-secondary)" }}>{window.DOW_SHORT[lang][i]}</div>
                  <div style={{ fontSize: 12, color: "var(--text-muted)", fontVariantNumeric: "tabular-nums" }}>{window.shortDate(d, lang)}</div>
                </div>
                <div style={{ width: 1, alignSelf: "stretch", background: "var(--border-subtle)" }}></div>
                <div style={chip(has ? "var(--sage-100)" : (pl && !pl.rest ? "var(--brand-50)" : "var(--ink-100)"), has ? "var(--sage-700)" : (pl && !pl.rest ? "var(--brand-600)" : "var(--ink-400)"), 38)}><L name={has ? "activity" : (pl && !pl.rest ? "calendar-check" : "circle-dashed")} size={19} /></div>
                <div style={{ flex: 1, minWidth: 0 }}>
                  {has ? (
                    <React.Fragment>
                      <div style={{ fontWeight: 700, fontSize: 15, color: "var(--text-primary)" }}>{dd.workouts.length} {t("workouts_count")}</div>
                      <div style={{ fontSize: 12.5, color: "var(--text-muted)" }}>{mins} {t("u_min")}{pl && !pl.rest ? " \u00b7 " + pl.name : ""}</div>
                    </React.Fragment>
                  ) : pl ? (
                    <React.Fragment>
                      <div style={{ fontWeight: 700, fontSize: 14.5, color: pl.rest ? "var(--text-muted)" : "var(--text-primary)" }}>{pl.name}</div>
                      <div style={{ fontSize: 12.5, color: "var(--text-muted)" }}>{pl.rest ? t("no_entries") : t("next_session") + " \u00b7 " + pl.mins + " " + t("u_min")}</div>
                    </React.Fragment>
                  ) : (
                    <div style={{ fontWeight: 700, fontSize: 15, color: "var(--text-muted)" }}>{t("no_entries")}</div>
                  )}
                </div>
                <L name="chevron-right" size={19} color="var(--ink-300)" />
              </Card>
            );
          })}
        </div>

        <Card soft padding="md" style={{ display: "flex", alignItems: "center", gap: 12 }}>
          <L name="calendar-check" size={20} color="var(--brand-500)" />
          <div style={{ fontSize: 13, color: "var(--text-secondary)", lineHeight: 1.45 }}>{t("week_note")}</div>
        </Card>
      </div>
    </div>
  );
}

const chip = (bg, fg, s) => ({ width: s, height: s, borderRadius: s >= 44 ? 14 : 11, background: bg, color: fg, display: "grid", placeItems: "center", flexShrink: 0 });
const iconBtn = { border: "none", background: "transparent", cursor: "pointer", color: "var(--ink-400)", padding: 6 };
const navBtn = { border: "none", background: "var(--surface-sunken)", width: 36, height: 36, borderRadius: 11, display: "grid", placeItems: "center", cursor: "pointer" };

Object.assign(window, { LiikeModule, VideoField });

</script>

<script type="text/babel">
/* Vire-app — Ravinto-moduuli. Alanavigaatio: Koti / Yleisnäkymä / Ruokapäiväkirja. */

const ATERIAT = [
  { id: "aamiainen", key: "meal_breakfast", icon: "sunrise" },
  { id: "lounas", key: "meal_lunch", icon: "sun" },
  { id: "valipala", key: "meal_snack", icon: "apple" },
  { id: "paivallinen", key: "meal_dinner", icon: "moon" },
];

const PIKAVALINNAT = [
  { name: { fi: "Kaurapuuro", en: "Oatmeal", sv: "Havregröt" }, kcal: 210 },
  { name: { fi: "Ruisleipä & juusto", en: "Rye bread & cheese", sv: "Rågbröd & ost" }, kcal: 180 },
  { name: { fi: "Kananmuna", en: "Egg", sv: "Ägg" }, kcal: 78 },
  { name: { fi: "Banaani", en: "Banana", sv: "Banan" }, kcal: 105 },
  { name: { fi: "Kanasalaatti", en: "Chicken salad", sv: "Kycklingsallad" }, kcal: 340 },
  { name: { fi: "Lohi & peruna", en: "Salmon & potato", sv: "Lax & potatis" }, kcal: 520 },
  { name: { fi: "Jogurtti & marjat", en: "Yogurt & berries", sv: "Yoghurt & bär" }, kcal: 160 },
  { name: { fi: "Kahvi & maito", en: "Coffee & milk", sv: "Kaffe & mjölk" }, kcal: 40 },
];

function RavintoModule({ store, onHome, t, lang, onMenu }) {
  const { AppFrame, BottomNav } = window;
  const [sub, setSub] = React.useState("yleis");
  const [jumpSlot, setJumpSlot] = React.useState(null);
  const items = [
    { id: "koti", label: t("nav_home"), icon: "house", onClick: onHome },
    { id: "yleis", label: t("nav_overview"), icon: "pie-chart", active: sub === "yleis", onClick: () => setSub("yleis") },
    { id: "kirja", label: t("nav_diary"), icon: "notebook-pen", active: sub === "kirja", onClick: () => setSub("kirja") },
  ];
  const openMeal = (slot) => { setJumpSlot(slot); setSub("kirja"); };
  const screen = sub === "kirja"
    ? <Ruokapaivakirja store={store} t={t} lang={lang} onMenu={onMenu} initialSlot={jumpSlot} />
    : <RavintoYleis store={store} t={t} lang={lang} onMenu={onMenu} onLog={() => setSub("kirja")} onOpenMeal={openMeal} />;
  return <AppFrame bottom={<BottomNav items={items} />}>{screen}</AppFrame>;
}

function RavintoYleis({ store, onLog, onOpenMeal, t, lang, onMenu }) {
  const { Card, ProgressRing, Button, Badge } = window.VS;
  const { L, PageHeader } = window;
  const key = window.dateKey();
  const day = store.day(key);
  const g = store.state.goals;
  const totals = window.dayTotals(day);
  const remaining = Math.max(0, g.energy - totals.energy);
  const byMeal = ATERIAT.map((a) => {
    const ms = day.meals.filter((m) => m.slot === a.id);
    return { ...a, kcal: ms.reduce((x, m) => x + (Number(m.kcal) || 0), 0), count: ms.length };
  });

  return (
    <div>
      <PageHeader title={t("food_title")} onMenu={onMenu} />
      <div style={{ padding: "0 20px", display: "flex", flexDirection: "column", gap: 14 }}>
        <div style={{ fontSize: 13, color: "var(--text-muted)", fontWeight: 600, margin: "-4px 4px 0" }}>{window.longDateL(lang)}</div>

        {/* ateriat painikkeina — avaa ruokapäiväkirjan oikean aterian */}
        <Card padding="md">
          <div style={{ fontWeight: 700, fontSize: 15, marginBottom: 8 }}>{t("todays_meals")}</div>
          <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
            {byMeal.map((m) => (
              <button key={m.id} onClick={() => onOpenMeal(m.id)} style={{
                display: "flex", alignItems: "center", gap: 13, padding: "11px 10px", width: "100%", textAlign: "left",
                border: "1px solid var(--border-subtle)", borderRadius: 14, background: "var(--surface-card)", cursor: "pointer", fontFamily: "var(--font-sans)",
              }}>
                <div style={chip(m.count ? "var(--apricot-100)" : "var(--ink-100)", m.count ? "var(--apricot-700)" : "var(--ink-400)")}><L name={m.icon} size={18} /></div>
                <div style={{ flex: 1, minWidth: 0 }}>
                  <div style={{ fontWeight: 600, fontSize: 14.5 }}>{t(m.key)}</div>
                  <div style={{ fontSize: 12.5, color: "var(--text-muted)" }}>{m.count ? `${m.count} ${t("entries_n")}` : t("not_logged")}</div>
                </div>
                <div style={{ fontWeight: 700, fontSize: 14, color: m.count ? "var(--text-secondary)" : "var(--ink-300)", fontVariantNumeric: "tabular-nums" }}>{m.kcal ? `${m.kcal} kcal` : "—"}</div>
                <L name="chevron-right" size={18} color="var(--ink-300)" />
              </button>
            ))}
          </div>
        </Card>

        {/* avaa ruokapäiväkirja — aterioiden ja energiaseurannan välissä */}
        <Button block variant="soft" iconLeft={<L name="notebook-pen" size={18} />} onClick={onLog}>{t("open_diary")}</Button>

        {/* energiaseuranta — nopea vilaus */}
        <Card padding="lg">
          <div style={{ display: "flex", alignItems: "center", gap: 18 }}>
            <ProgressRing value={totals.energy} max={g.energy} accent="nutrition" valueText={window.numFmt(lang, totals.energy)} label={`/ ${window.numFmt(lang, g.energy)} kcal`} size={120} thickness={11} />
            <div style={{ flex: 1 }}>
              <div style={{ fontSize: 13, color: "var(--text-muted)", fontWeight: 600 }}>{t("remaining")}</div>
              <div style={{ fontSize: 30, fontWeight: 800, letterSpacing: "-0.02em", fontVariantNumeric: "tabular-nums" }}>{window.numFmt(lang, remaining)} kcal</div>
              <div style={{ marginTop: 8 }}>
                <Badge tone={totals.energy === 0 ? "neutral" : "success"} dot>{totals.energy === 0 ? t("no_logs_yet") : t("good_balance")}</Badge>
              </div>
            </div>
          </div>
        </Card>

        <WaterCard store={store} dayKey={key} t={t} />
      </div>
    </div>
  );
}

function WaterCard({ store, dayKey, t }) {
  const { Card } = window.VS;
  const { L } = window;
  const day = store.day(dayKey);
  const goal = store.state.goals.water;
  const water = day.water || 0;
  return (
    <Card padding="md">
      <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 12 }}>
        <L name="droplet" size={20} color="var(--brand-500)" />
        <span style={{ fontWeight: 700, fontSize: 15 }}>{t("goal_water")}</span>
        <span style={{ fontSize: 13, color: "var(--text-muted)", fontWeight: 600 }}>{water} / {goal} {t("u_glasses")}</span>
      </div>
      <div style={{ display: "flex", gap: 7, flexWrap: "wrap" }}>
        {Array.from({ length: goal }).map((_, i) => (
          <div key={i} onClick={() => store.setWater(dayKey, water === i + 1 ? i : i + 1)} style={{
            flex: "1 1 0", minWidth: 28, height: 38, borderRadius: 10, cursor: "pointer",
            background: i < water ? "var(--brand-100)" : "var(--surface-sunken)",
            border: i < water ? "1.5px solid var(--brand-300)" : "1.5px solid transparent", display: "grid", placeItems: "center",
          }}>
            <L name="droplet" size={16} color={i < water ? "var(--brand-500)" : "var(--ink-300)"} />
          </div>
        ))}
      </div>
    </Card>
  );
}

function Ruokapaivakirja({ store, t, lang, onMenu, initialSlot }) {
  const { Card, Button, Input, Badge } = window.VS;
  const { L, PageHeader, Dropdown, SectionLabel } = window;
  const key = window.dateKey();
  const day = store.day(key);
  const [slot, setSlot] = React.useState(initialSlot || "aamiainen");
  React.useEffect(() => { if (initialSlot) setSlot(initialSlot); }, [initialSlot]);
  const [text, setText] = React.useState("");
  const [kcal, setKcal] = React.useState("");

  const addFree = () => {
    if (!text.trim()) return;
    store.addMeal(key, { slot, text: text.trim(), kcal: Math.round(Number(kcal) || 0) });
    setText(""); setKcal("");
  };
  const addQuick = (idx) => {
    const q = PIKAVALINNAT[idx];
    store.addMeal(key, { slot, text: q.name[lang] || q.name.fi, kcal: q.kcal });
  };

  const slotMeals = day.meals.filter((m) => m.slot === slot);
  const menuOpts = PIKAVALINNAT.map((q, i) => ({ value: String(i), label: `${q.name[lang] || q.name.fi} · ${q.kcal} kcal`, icon: <L name="utensils" size={16} /> }));

  return (
    <div>
      <PageHeader title={t("nav_diary")} onMenu={onMenu} />
      <div style={{ padding: "0 20px", display: "flex", flexDirection: "column", gap: 14 }}>
        <div style={{ fontSize: 13, color: "var(--text-muted)", fontWeight: 600, margin: "-4px 4px 0" }}>{window.longDateL(lang)}</div>

        {/* ateriavalinta — visuaalinen merkki kun kirjattu */}
        <div style={{ display: "flex", gap: 8 }}>
          {ATERIAT.map((a) => {
            const on = slot === a.id;
            const logged = day.meals.some((m) => m.slot === a.id);
            return (
              <button key={a.id} onClick={() => setSlot(a.id)} style={{
                position: "relative", flex: 1, border: on ? "1.5px solid var(--brand-400)" : "1px solid var(--border-default)",
                background: on ? "var(--brand-50)" : (logged ? "var(--sage-100)" : "var(--surface-card)"), borderRadius: "var(--radius-md)",
                padding: "10px 4px", cursor: "pointer", display: "flex", flexDirection: "column", alignItems: "center", gap: 4,
                color: on ? "var(--brand-700)" : (logged ? "var(--sage-700)" : "var(--ink-500)"), fontFamily: "var(--font-sans)",
              }}>
                {logged ? (
                  <span style={{ position: "absolute", top: 5, right: 5, width: 14, height: 14, borderRadius: "50%", background: "var(--sage-500)", display: "grid", placeItems: "center" }}>
                    <L name="check" size={10} color="#fff" strokeWidth={3.5} />
                  </span>
                ) : null}
                <L name={a.icon} size={19} />
                <span style={{ fontSize: 11, fontWeight: on || logged ? 700 : 600 }}>{t(a.key)}</span>
              </button>
            );
          })}
        </div>

        {/* vapaa kirjaus */}
        <Card padding="md" style={{ display: "flex", flexDirection: "column", gap: 12 }}>
          <div style={{ fontWeight: 700, fontSize: 15 }}>{t("write_self")} — {t(ATERIAT.find((a) => a.id === slot).key).toLowerCase()}</div>
          <textarea placeholder={t("meal_ph")} value={text} onChange={(e) => setText(e.target.value)} rows={2}
            style={{ width: "100%", boxSizing: "border-box", resize: "none", borderRadius: "var(--radius-md)", border: "1px solid var(--border-default)", padding: "11px 14px", fontFamily: "var(--font-sans)", fontSize: 15, color: "var(--text-primary)", background: "var(--surface-card)", lineHeight: 1.45 }} />
          <div style={{ display: "flex", gap: 10 }}>
            <div style={{ width: 130 }}>
              <Input type="number" placeholder="kcal" value={kcal} onChange={(e) => setKcal(e.target.value)} optional={t("optional")} />
            </div>
            <div style={{ flex: 1, display: "flex", alignItems: "flex-start" }}>
              <Button block onClick={addFree} disabled={!text.trim()} iconLeft={<L name="plus" size={17} />}>{t("add")}</Button>
            </div>
          </div>

          {/* dropvalikko: valitse valikosta */}
          <div>
            <SectionLabel style={{ margin: "4px 0 8px" }}>{t("choose_menu")}</SectionLabel>
            <Dropdown value="" options={menuOpts} placeholder={t("choose_menu")} icon={<L name="list" size={18} />} onChange={(v) => addQuick(Number(v))} />
            <div style={{ fontSize: 11.5, color: "var(--text-muted)", marginTop: 8, lineHeight: 1.45 }}>{t("menu_note")}</div>
          </div>
        </Card>

        {/* kirjaukset tälle aterialle */}
        <SectionLabel>{t(ATERIAT.find((a) => a.id === slot).key)} — {t("logged_label")}</SectionLabel>
        {slotMeals.length === 0 ? (
          <Card flat style={{ display: "flex", alignItems: "center", gap: 12, padding: "16px 14px" }}>
            <div style={chip("var(--ink-100)", "var(--ink-400)")}><L name="utensils" size={17} /></div>
            <span style={{ fontSize: 14, color: "var(--text-muted)" }}>{t("no_meals_slot")}</span>
          </Card>
        ) : (
          <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
            {slotMeals.map((m) => (
              <Card key={m.id} flat style={{ display: "flex", alignItems: "center", gap: 12, padding: "11px 13px" }}>
                <div style={{ flex: 1, minWidth: 0, fontSize: 14.5, fontWeight: 600, lineHeight: 1.35 }}>{m.text}</div>
                {m.kcal ? <Badge tone="nutrition">{m.kcal} kcal</Badge> : null}
                <button onClick={() => store.removeMeal(key, m.id)} style={{ border: "none", background: "transparent", cursor: "pointer", color: "var(--ink-400)", padding: 4 }}><L name="trash-2" size={17} /></button>
              </Card>
            ))}
          </div>
        )}
      </div>
    </div>
  );
}

const chip = (bg, fg) => ({ width: 36, height: 36, borderRadius: 11, background: bg, color: fg, display: "grid", placeItems: "center", flexShrink: 0 });

Object.assign(window, { RavintoModule, ATERIAT });

</script>

<script type="text/babel">
/* Vire-app — historia: Treenihistoria & Ravintohistoria (vko / 6kk / vuosi)
   + fiilishistoria. Palkkikuvaajat ilman ulkoista kirjastoa. */

function BarChart({ data, color, soft, height = 200, unit, lang }) {
  const max = Math.max(1, ...data.map((d) => d.value)) * 1.15;
  return (
    <div style={{ display: "flex", alignItems: "flex-end", gap: data.length > 8 ? 4 : 10, height, paddingTop: 8 }}>
      {data.map((d, i) => (
        <div key={i} style={{ flex: 1, display: "flex", flexDirection: "column", alignItems: "center", gap: 8, height: "100%", minWidth: 0 }}>
          <div style={{ flex: 1, width: "100%", display: "flex", alignItems: "flex-end", justifyContent: "center" }}>
            <div title={`${d.value}`} style={{
              width: data.length > 8 ? "78%" : "62%", maxWidth: 40, height: `${(d.value / max) * 100}%`, minHeight: d.value > 0 ? 8 : 3,
              borderRadius: 7, background: d.value > 0 ? (d.highlight ? color : soft) : "var(--ink-100)",
            }}></div>
          </div>
          <span style={{ fontSize: data.length > 8 ? 9.5 : 11.5, fontWeight: d.highlight ? 700 : 600, color: d.highlight ? "var(--text-primary)" : "var(--text-muted)", whiteSpace: "nowrap" }}>{d.label}</span>
        </div>
      ))}
    </div>
  );
}

function aggregate(store, range, metricFn, lang) {
  const today = new Date();
  if (range === "week") {
    return window.weekDays(today).map((d, i) => ({
      label: window.DOW_SHORT[lang][i],
      value: metricFn(store.day(window.dateKey(d))),
      highlight: window.dateKey(d) === window.dateKey(),
    }));
  }
  const months = range === "6mo" ? 6 : 12;
  const buckets = [];
  for (let k = months - 1; k >= 0; k--) {
    const d = new Date(today.getFullYear(), today.getMonth() - k, 1);
    const lbl = months === 12 ? window.MONTHS_SHORT[lang][d.getMonth()].charAt(0).toUpperCase() : window.MONTHS_SHORT[lang][d.getMonth()];
    buckets.push({ y: d.getFullYear(), m: d.getMonth(), label: lbl, value: 0, highlight: k === 0 });
  }
  Object.entries(store.state.days).forEach(([key, day]) => {
    const dt = window.parseKey(key);
    const b = buckets.find((x) => x.y === dt.getFullYear() && x.m === dt.getMonth());
    if (b) b.value += metricFn(day);
  });
  return buckets;
}

function HistoryView({ store, t, lang, kind, onBack, onMenu }) {
  const { Card, SegmentedControl, Badge } = window.VS;
  const { PageHeader, SectionLabel } = window;
  const [range, setRange] = React.useState("week");

  const isTrain = kind === "train";
  const metricFn = isTrain
    ? (d) => d.workouts.reduce((a, w) => a + (Number(w.mins) || 0), 0)
    : (d) => d.meals.reduce((a, m) => a + (Number(m.kcal) || 0), 0);
  const countFn = isTrain ? (d) => d.workouts.length : (d) => d.meals.length;

  const data = aggregate(store, range, metricFn, lang);
  const total = data.reduce((a, d) => a + d.value, 0);
  const nonZero = data.filter((d) => d.value > 0).length;
  const avg = nonZero ? Math.round(total / nonZero) : 0;
  const totalCount = Object.values(store.state.days).reduce((a, d) => a + countFn(d), 0);

  const color = isTrain ? "var(--sage-500)" : "var(--apricot-500)";
  const soft = isTrain ? "var(--sage-300)" : "var(--apricot-300)";
  const unit = isTrain ? t("u_min") : "kcal";

  return (
    <div>
      <PageHeader title={isTrain ? t("trainhist_t") : t("foodhist_t")} onBack={onBack} onMenu={onMenu} />
      <div style={{ padding: "0 20px", display: "flex", flexDirection: "column", gap: 16 }}>
        <SegmentedControl block
          options={[{ value: "week", label: t("range_week") }, { value: "6mo", label: t("range_6mo") }, { value: "year", label: t("range_year") }]}
          value={range} onChange={setRange} />

        {/* yhteenveto */}
        <div style={{ display: "flex", gap: 10 }}>
          <Card padding="md" style={{ flex: 1 }}>
            <div style={{ fontSize: 12.5, color: "var(--text-muted)", fontWeight: 600 }}>{isTrain ? t("activemin_label") : t("energy_label")} ({t("total_label")})</div>
            <div style={{ fontSize: 26, fontWeight: 800, letterSpacing: "-0.02em", fontVariantNumeric: "tabular-nums" }}>{window.numFmt(lang, total)}</div>
            <div style={{ fontSize: 12.5, color: "var(--text-muted)" }}>{unit}</div>
          </Card>
          <Card padding="md" style={{ flex: 1 }}>
            <div style={{ fontSize: 12.5, color: "var(--text-muted)", fontWeight: 600 }}>{isTrain ? t("workouts_label") : t("st_meals")}</div>
            <div style={{ fontSize: 26, fontWeight: 800, letterSpacing: "-0.02em", fontVariantNumeric: "tabular-nums" }}>{totalCount}</div>
            <div style={{ fontSize: 12.5, color: "var(--text-muted)" }}>{t("total_label")}</div>
          </Card>
        </div>

        {/* kuvaaja */}
        <Card padding="lg">
          <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 6 }}>
            <div style={{ fontWeight: 700, fontSize: 15 }}>{isTrain ? t("activemin_label") : t("energy_label")}</div>
            {total > 0 ? <Badge tone={isTrain ? "movement" : "nutrition"} dot>{t("avg_label")} {window.numFmt(lang, avg)} {unit}</Badge> : null}
          </div>
          {total === 0 ? (
            <div style={{ padding: "40px 0", textAlign: "center", color: "var(--text-muted)", fontSize: 14 }}>{t("no_history")}</div>
          ) : (
            <BarChart data={data} color={color} soft={soft} unit={unit} lang={lang} height={210} />
          )}
        </Card>

        {/* ravintohistoriassa: mitä on syöty (ei pelkästään energia) */}
        {!isTrain ? <EatenList store={store} t={t} lang={lang} /> : null}

        {/* fiilishistoria */}
        <MoodHistory store={store} t={t} lang={lang} />
      </div>
    </div>
  );
}

function EatenList({ store, t, lang }) {
  const { Card } = window.VS;
  const { L, SectionLabel } = window;
  const ATERIAT = window.ATERIAT || [];
  const slotInfo = (id) => ATERIAT.find((a) => a.id === id);
  // kerää päivät joilla aterioita, uusin ensin
  const entries = Object.keys(store.state.days)
    .sort().reverse()
    .map((k) => ({ k, meals: (store.state.days[k].meals || []) }))
    .filter((d) => d.meals.length > 0)
    .slice(0, 8);

  return (
    <div>
      <SectionLabel>{t("foodhist_recent")}</SectionLabel>
      {entries.length === 0 ? (
        <Card padding="md" style={{ fontSize: 13.5, color: "var(--text-muted)", textAlign: "center" }}>{t("foodhist_none")}</Card>
      ) : (
        <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
          {entries.map((d) => {
            const dt = window.parseKey(d.k);
            const isToday = d.k === window.dateKey();
            const dayKcal = d.meals.reduce((a, m) => a + (Number(m.kcal) || 0), 0);
            const label = isToday ? t("nav_today") : `${window.DOW_SHORT[lang][(dt.getDay() + 6) % 7]} ${window.shortDate(dt, lang)}`;
            return (
              <Card key={d.k} padding="sm" style={{ padding: 12 }}>
                <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 8, padding: "0 2px" }}>
                  <div style={{ fontSize: 13, fontWeight: 800, color: isToday ? "var(--brand-700)" : "var(--text-primary)" }}>{label}</div>
                  <div style={{ fontSize: 12.5, fontWeight: 700, color: "var(--text-muted)", fontVariantNumeric: "tabular-nums" }}>{dayKcal ? `${window.numFmt(lang, dayKcal)} kcal` : ""}</div>
                </div>
                <div style={{ display: "flex", flexDirection: "column" }}>
                  {d.meals.map((m, i) => {
                    const si = slotInfo(m.slot);
                    return (
                      <div key={m.id} style={{ display: "flex", alignItems: "center", gap: 11, padding: "8px 2px", borderTop: i > 0 ? "1px solid var(--border-subtle)" : "none" }}>
                        <div style={{ width: 30, height: 30, borderRadius: 9, background: "var(--apricot-100)", color: "var(--apricot-700)", display: "grid", placeItems: "center", flexShrink: 0 }}><L name={si ? si.icon : "utensils"} size={16} /></div>
                        <div style={{ flex: 1, minWidth: 0 }}>
                          <div style={{ fontSize: 14, fontWeight: 600, lineHeight: 1.3 }}>{m.text}</div>
                          {si ? <div style={{ fontSize: 11.5, color: "var(--text-muted)", fontWeight: 600 }}>{t(si.key)}</div> : null}
                        </div>
                        {m.kcal ? <span style={{ fontSize: 13, fontWeight: 700, color: "var(--text-secondary)", fontVariantNumeric: "tabular-nums" }}>{m.kcal} kcal</span> : null}
                      </div>
                    );
                  })}
                </div>
              </Card>
            );
          })}
        </div>
      )}
    </div>
  );
}

function MoodHistory({ store, t, lang }) {
  const { Card } = window.VS;
  const { L, SectionLabel } = window;
  const MOODS = window.MOODS;
  // viimeiset 14 päivää
  const today = new Date();
  const days = Array.from({ length: 14 }, (_, i) => { const d = new Date(today); d.setDate(today.getDate() - (13 - i)); return d; });
  const any = days.some((d) => store.day(window.dateKey(d)).mood);
  return (
    <div>
      <SectionLabel>{t("mood_hist_t")}</SectionLabel>
      <Card padding="md">
        {!any ? (
          <div style={{ fontSize: 13.5, color: "var(--text-muted)", textAlign: "center", padding: "12px 0" }}>{t("no_history")}</div>
        ) : (
          <div style={{ display: "flex", gap: 4, justifyContent: "space-between" }}>
            {days.map((d, i) => {
              const mood = store.day(window.dateKey(d)).mood;
              const m = MOODS.find((x) => x.value === mood);
              return (
                <div key={i} style={{ flex: 1, display: "flex", flexDirection: "column", alignItems: "center", gap: 4 }}>
                  <div style={{ width: "100%", aspectRatio: "1", maxWidth: 26, borderRadius: 8, display: "grid", placeItems: "center", background: m ? "color-mix(in srgb, " + m.color + " 18%, transparent)" : "var(--surface-sunken)" }}>
                    {m ? <L name={m.icon} size={14} color={m.color} /> : <span style={{ width: 4, height: 4, borderRadius: 99, background: "var(--ink-300)" }}></span>}
                  </div>
                  <span style={{ fontSize: 8.5, color: "var(--text-muted)", fontWeight: 600 }}>{d.getDate()}</span>
                </div>
              );
            })}
          </div>
        )}
      </Card>
    </div>
  );
}

Object.assign(window, { HistoryView, BarChart });

</script>

<script type="text/babel">
/* Vire-app — alasivut: Omat tiedot, Ilmoitukset, Asetukset. */

/* ---------- Omat tiedot ---------- */
function MyInfoView({ store, t, lang, onBack, onMenu }) {
  const { Card, Input, Button, Avatar } = window.VS;
  const { L, PageHeader } = window;
  const p = store.state.profile;
  const [f, setF] = React.useState({ name: p.name, email: p.email, age: p.age, height: p.height, weight: p.weight });
  const [saved, setSaved] = React.useState(false);
  const set = (k, v) => { setF((x) => ({ ...x, [k]: v })); setSaved(false); };
  const save = () => { store.updateProfile(f); setSaved(true); };

  const pickPhoto = (e) => {
    const file = e.target.files && e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = () => store.updateProfile({ photo: reader.result });
    reader.readAsDataURL(file);
  };

  return (
    <div>
      <PageHeader title={t("myinfo_t")} onBack={onBack} onMenu={onMenu} />
      <div style={{ padding: "0 20px", display: "flex", flexDirection: "column", gap: 16 }}>
        {/* kuva */}
        <Card padding="lg" style={{ display: "flex", alignItems: "center", gap: 16 }}>
          {p.photo ? (
            <img src={p.photo} alt={p.name} style={{ width: 72, height: 72, borderRadius: "50%", objectFit: "cover", boxShadow: "0 0 0 2px var(--surface-card), 0 0 0 4px var(--brand-300)" }} />
          ) : <Avatar name={p.name || "?"} size="xl" ring />}
          <div style={{ flex: 1 }}>
            <div style={{ fontWeight: 700, fontSize: 16, marginBottom: 8 }}>{p.name || "—"}</div>
            <label style={{ display: "inline-flex", alignItems: "center", gap: 7, padding: "8px 14px", borderRadius: "var(--radius-md)", background: "var(--surface-brand-soft)", color: "var(--text-brand)", fontWeight: 700, fontSize: 13.5, cursor: "pointer" }}>
              <L name="camera" size={16} /> {t("change_photo")}
              <input type="file" accept="image/*" onChange={pickPhoto} style={{ display: "none" }} />
            </label>
          </div>
        </Card>

        {/* kentät */}
        <Card padding="md" style={{ display: "flex", flexDirection: "column", gap: 12 }}>
          <Input label={t("field_name")} value={f.name} onChange={(e) => set("name", e.target.value)} />
          <Input label={t("field_email")} type="email" placeholder="aino@esimerkki.fi" value={f.email} onChange={(e) => set("email", e.target.value)} optional={t("optional")} />
          <div style={{ display: "flex", gap: 10 }}>
            <Input label={t("field_age")} type="number" value={f.age} onChange={(e) => set("age", e.target.value)} style={{ flex: 1 }} optional={t("optional")} />
            <Input label={t("field_height")} type="number" value={f.height} onChange={(e) => set("height", e.target.value)} style={{ flex: 1 }} optional={t("optional")} />
            <Input label={t("field_weight")} type="number" value={f.weight} onChange={(e) => set("weight", e.target.value)} style={{ flex: 1 }} optional={t("optional")} />
          </div>
          <div style={{ fontSize: 11.5, color: "var(--text-muted)", lineHeight: 1.45 }}>{t("myinfo_note")}</div>
          <Button block onClick={save} iconLeft={<L name={saved ? "check" : "save"} size={17} />}>{saved ? t("saved_ok") : t("save")}</Button>
        </Card>
      </div>
    </div>
  );
}

/* ---------- Ilmoitukset ---------- */
function NotificationsView({ store, t, onBack, onMenu }) {
  const { Card, Switch } = window.VS;
  const { L, PageHeader } = window;
  const n = store.state.settings.notif;
  const rows = [
    { k: "workout", icon: "footprints", tint: "var(--sage-500)", label: t("notif_workout"), sub: t("notif_workout_s") },
    { k: "meal", icon: "utensils", tint: "var(--apricot-500)", label: t("notif_meal"), sub: t("notif_meal_s") },
    { k: "weekly", icon: "calendar-check", tint: "var(--brand-500)", label: t("notif_weekly"), sub: t("notif_weekly_s") },
    { k: "mood", icon: "heart", tint: "var(--lilac-500)", label: t("notif_mood"), sub: t("notif_mood_s") },
  ];
  return (
    <div>
      <PageHeader title={t("notif_t")} onBack={onBack} onMenu={onMenu} />
      <div style={{ padding: "0 20px", display: "flex", flexDirection: "column", gap: 14 }}>
        <div style={{ fontSize: 14, color: "var(--text-secondary)", margin: "-2px 4px 0", lineHeight: 1.45 }}>{t("notif_sub")}</div>
        <Card bare style={{ overflow: "hidden", border: "1px solid var(--border-subtle)", boxShadow: "var(--shadow-sm)", padding: 0 }}>
          {rows.map((r, i) => (
            <div key={r.k} style={{ display: "flex", alignItems: "center", gap: 13, padding: "14px 16px", borderBottom: i < rows.length - 1 ? "1px solid var(--border-subtle)" : "none" }}>
              <div style={{ width: 36, height: 36, borderRadius: 11, background: "var(--ink-50)", color: r.tint, display: "grid", placeItems: "center", flexShrink: 0 }}><L name={r.icon} size={19} /></div>
              <div style={{ flex: 1, minWidth: 0 }}>
                <div style={{ fontSize: 14.5, fontWeight: 600 }}>{r.label}</div>
                <div style={{ fontSize: 12.5, color: "var(--text-muted)" }}>{r.sub}</div>
              </div>
              <Switch checked={!!n[r.k]} onChange={() => store.updateNotif({ [r.k]: !n[r.k] })} />
            </div>
          ))}
        </Card>
      </div>
    </div>
  );
}

/* ---------- Asetukset ---------- */
function SettingsView({ store, t, lang, onBack, onMenu }) {
  const { Card, Switch, Button, Input } = window.VS;
  const { L, PageHeader, SectionLabel, Dropdown } = window;
  const s = store.state.settings;
  const [syncUrl, setSyncUrl] = React.useState(s.syncUrl || "");
  const [syncState, setSyncState] = React.useState(null); // null | 'loading' | 'ok' | 'fail' | 'none'
  const [confirmReset, setConfirmReset] = React.useState(false);

  const doSync = async () => {
    store.updateSettings({ syncUrl });
    if (!syncUrl) { setSyncState("none"); return; }
    setSyncState("loading");
    const res = await window.fetchPrograms(syncUrl);
    if (res.ok) { store.setPrograms(res.programs); setSyncState("ok"); }
    else setSyncState("fail");
  };
  const loadDemo = () => { store.setPrograms({ workouts: window.DEFAULT_PLAN, nutrition: null }); setSyncState("demo"); };
  const programs = store.state.programs || {};
  const syncedTime = programs.syncedAt ? new Date(programs.syncedAt).toLocaleString(window.localeFor(lang), { day: "numeric", month: "short", hour: "2-digit", minute: "2-digit" }) : null;

  const langOpts = [
    { value: "fi", label: t("lang_fi"), icon: <L name="languages" size={16} /> },
    { value: "en", label: t("lang_en"), icon: <L name="languages" size={16} /> },
    { value: "sv", label: t("lang_sv"), icon: <L name="languages" size={16} /> },
  ];

  return (
    <div>
      <PageHeader title={t("settings_t")} onBack={onBack} onMenu={onMenu} />
      <div style={{ padding: "0 20px", display: "flex", flexDirection: "column", gap: 16 }}>
        {/* ulkoasu */}
        <div>
          <SectionLabel>{t("appearance")}</SectionLabel>
          <Card bare style={{ overflow: "hidden", border: "1px solid var(--border-subtle)", boxShadow: "var(--shadow-sm)", padding: 0 }}>
            <ToggleRow icon="moon" tint="var(--lilac-500)" label={t("dark_mode")} sub={t("dark_mode_s")}
              checked={s.theme === "dark"} onChange={() => store.updateSettings({ theme: s.theme === "dark" ? "light" : "dark" })} />
            <ToggleRow icon="circle-dashed" tint="var(--brand-500)" label={t("hide_rings")} sub={t("hide_rings_s")} last
              checked={s.hideRings} onChange={() => store.updateSettings({ hideRings: !s.hideRings })} />
          </Card>
        </div>

        {/* kieli */}
        <div>
          <SectionLabel>{t("language")}</SectionLabel>
          <Dropdown value={s.lang} options={langOpts} onChange={(v) => store.updateSettings({ lang: v })} icon={<L name="languages" size={18} />} />
        </div>

        {/* pilvisynkronointi */}
        <div>
          <SectionLabel>{t("cloud_section")}</SectionLabel>
          <Card padding="md" style={{ display: "flex", flexDirection: "column", gap: 12 }}>
            {syncedTime ? (
              <div style={{ display: "flex", alignItems: "center", gap: 11, padding: "10px 12px", borderRadius: 12, background: "var(--status-success-bg)" }}>
                <div style={{ width: 34, height: 34, borderRadius: 10, background: "var(--green-500)", color: "#fff", display: "grid", placeItems: "center", flexShrink: 0 }}><L name="check" size={18} strokeWidth={2.6} /></div>
                <div style={{ flex: 1, minWidth: 0 }}>
                  <div style={{ fontSize: 14, fontWeight: 700, color: "var(--green-700)" }}>{t("program_active")}</div>
                  <div style={{ fontSize: 12, color: "var(--text-muted)" }}>{t("synced_at")} {syncedTime}</div>
                </div>
                <button onClick={() => { store.clearPrograms(); setSyncState(null); }} style={{ border: "none", background: "transparent", cursor: "pointer", color: "var(--ink-400)", padding: 4 }}><L name="x" size={18} /></button>
              </div>
            ) : null}
            <Input label={t("sync_url")} placeholder={t("sync_url_ph")} value={syncUrl} onChange={(e) => setSyncUrl(e.target.value)} optional={t("optional")} />
            <div style={{ display: "flex", alignItems: "center", gap: 10, flexWrap: "wrap" }}>
              <Button onClick={doSync} variant="secondary" iconLeft={<L name="refresh-cw" size={16} />}>{t("sync_now")}</Button>
              {syncState === "loading" ? <span style={{ fontSize: 13, color: "var(--text-muted)" }}>…</span> : null}
              {syncState === "ok" ? <span style={{ fontSize: 13, color: "var(--green-700)", fontWeight: 700, display: "inline-flex", alignItems: "center", gap: 5 }}><L name="check-circle-2" size={16} /> {t("sync_ok")}</span> : null}
              {syncState === "fail" ? <span style={{ fontSize: 13, color: "var(--coral-700)", fontWeight: 700 }}>{t("sync_fail")}</span> : null}
              {syncState === "none" ? <span style={{ fontSize: 13, color: "var(--text-muted)" }}>{t("sync_none")}</span> : null}
              {syncState === "demo" ? <span style={{ fontSize: 13, color: "var(--green-700)", fontWeight: 700, display: "inline-flex", alignItems: "center", gap: 5 }}><L name="check-circle-2" size={16} /> {t("sync_loaded")}</span> : null}
            </div>
            <div style={{ fontSize: 11.5, color: "var(--text-muted)", lineHeight: 1.45 }}>{t("sync_help")}</div>
            <Button block variant="soft" iconLeft={<L name="download" size={17} />} onClick={loadDemo}>{t("sync_demo_btn")}</Button>
          </Card>
        </div>

        {/* tiedot / nollaus */}
        <div>
          <SectionLabel>{t("data_section")}</SectionLabel>
          <Card padding="md">
            {!confirmReset ? (
              <div style={{ display: "flex", alignItems: "center", gap: 13 }}>
                <div style={{ width: 38, height: 38, borderRadius: 11, background: "var(--status-error-bg)", color: "var(--coral-700)", display: "grid", placeItems: "center", flexShrink: 0 }}><L name="rotate-ccw" size={19} /></div>
                <div style={{ flex: 1 }}>
                  <div style={{ fontSize: 14.5, fontWeight: 700 }}>{t("start_over")}</div>
                  <div style={{ fontSize: 12.5, color: "var(--text-muted)" }}>{t("start_over_s")}</div>
                </div>
                <Button variant="ghost" size="sm" onClick={() => setConfirmReset(true)}>{t("reset_btn")}</Button>
              </div>
            ) : (
              <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
                <div style={{ fontSize: 14, color: "var(--text-secondary)", lineHeight: 1.45 }}>{t("reset_confirm")}</div>
                <div style={{ display: "flex", gap: 10 }}>
                  <Button variant="ghost" onClick={() => setConfirmReset(false)}>{t("cancel")}</Button>
                  <Button block variant="danger" style={{ background: "var(--coral-500)", color: "#fff" }} onClick={() => store.resetAll()}>{t("reset_yes")}</Button>
                </div>
              </div>
            )}
          </Card>
        </div>
      </div>
    </div>
  );
}

function ToggleRow({ icon, tint, label, sub, checked, onChange, last }) {
  const { Switch } = window.VS;
  const { L } = window;
  return (
    <div style={{ display: "flex", alignItems: "center", gap: 13, padding: "14px 16px", borderBottom: last ? "none" : "1px solid var(--border-subtle)" }}>
      <div style={{ width: 36, height: 36, borderRadius: 11, background: "var(--ink-50)", color: tint, display: "grid", placeItems: "center", flexShrink: 0 }}><L name={icon} size={19} /></div>
      <div style={{ flex: 1, minWidth: 0 }}>
        <div style={{ fontSize: 14.5, fontWeight: 600 }}>{label}</div>
        <div style={{ fontSize: 12.5, color: "var(--text-muted)" }}>{sub}</div>
      </div>
      <Switch checked={checked} onChange={onChange} />
    </div>
  );
}

Object.assign(window, { MyInfoView, NotificationsView, SettingsView });

</script>

<script type="text/babel">
/* Vire-app — Profiili-moduuli: pääsivu + alasivut (omat tiedot, historiat,
   ilmoitukset, asetukset) + kirjaudu ulos. */

function ProfileModule({ store, t, lang, page, setPage, onMenu }) {
  const [localPage, setLocalPage] = React.useState("main");
  const pg = page !== undefined ? page : localPage;
  const nav = setPage || setLocalPage;
  const back = () => nav("main");
  if (pg === "myinfo") return <window.MyInfoView store={store} t={t} lang={lang} onBack={back} onMenu={onMenu} />;
  if (pg === "messages") return <window.MessagesView store={store} t={t} lang={lang} onBack={back} onMenu={onMenu} />;
  if (pg === "export") return <window.ExportView store={store} t={t} lang={lang} onBack={back} onMenu={onMenu} />;
  if (pg === "trainhist") return <window.HistoryView store={store} t={t} lang={lang} kind="train" onBack={back} onMenu={onMenu} />;
  if (pg === "foodhist") return <window.HistoryView store={store} t={t} lang={lang} kind="food" onBack={back} onMenu={onMenu} />;
  if (pg === "notif") return <window.NotificationsView store={store} t={t} onBack={back} onMenu={onMenu} />;
  if (pg === "settings") return <window.SettingsView store={store} t={t} lang={lang} onBack={back} onMenu={onMenu} />;
  return <ProfileMain store={store} t={t} lang={lang} onNav={nav} onMenu={onMenu} />;
}

function ProfileMain({ store, t, lang, onNav, onMenu }) {
  const { Card, Avatar, Badge, Button } = window.VS;
  const { L, PageHeader, SectionLabel } = window;
  const p = store.state.profile;
  const g = store.state.goals;
  const [confirmLogout, setConfirmLogout] = React.useState(false);

  const days = Object.values(store.state.days);
  const totalMeals = days.reduce((a, d) => a + d.meals.length, 0);
  const totalWorkouts = days.reduce((a, d) => a + d.workouts.length, 0);
  const activeDays = days.filter((d) => d.meals.length || d.workouts.length || d.steps || d.water || d.mood).length;
  const sinceDate = p.since ? window.parseKey(p.since) : new Date();
  const daysSince = Math.max(1, Math.round((Date.now() - sinceDate) / 86400000) + 1);

  const menu = [
    { id: "myinfo", icon: "user-round", label: t("m_myinfo") },
    { id: "messages", icon: "message-circle", label: t("m_messages") },
    { id: "trainhist", icon: "trending-up", label: t("m_trainhist") },
    { id: "foodhist", icon: "utensils", label: t("m_foodhist") },
    { id: "export", icon: "download", label: t("m_export") },
    { id: "notif", icon: "bell", label: t("m_notif") },
    { id: "settings", icon: "settings", label: t("m_settings") },
  ];

  const avatar = p.photo
    ? <img src={p.photo} alt={p.name} style={{ width: 80, height: 80, borderRadius: "50%", objectFit: "cover", boxShadow: "0 0 0 2px var(--surface-card), 0 0 0 4px var(--brand-300)" }} />
    : <Avatar name={p.name || "?"} size="xl" ring />;

  return (
    <div>
      <PageHeader title={t("profile_t")} onMenu={onMenu} />
      <div style={{ padding: "0 20px", display: "flex", flexDirection: "column", gap: 16 }}>
        {/* identiteetti */}
        <Card padding="lg" style={{ display: "flex", alignItems: "center", gap: 16 }}>
          {avatar}
          <div style={{ flex: 1, minWidth: 0 }}>
            <div style={{ fontSize: 21, fontWeight: 800 }}>{p.name || "—"}</div>
            <div style={{ fontSize: 13.5, color: "var(--text-muted)", marginBottom: 8 }}>{t("member_days", { n: daysSince })}</div>
            <Badge tone="brand" dot>{t("pilot_user")}</Badge>
          </div>
        </Card>

        {/* koonti */}
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 12 }}>
          {[{ v: totalMeals, l: t("st_meals") }, { v: totalWorkouts, l: t("st_workouts") }, { v: activeDays, l: t("st_active") }].map((s) => (
            <Card key={s.l} padding="md" style={{ textAlign: "center" }}>
              <div style={{ fontSize: 24, fontWeight: 800, fontVariantNumeric: "tabular-nums" }}>{s.v}</div>
              <div style={{ fontSize: 12, color: "var(--text-muted)", fontWeight: 600 }}>{s.l}</div>
            </Card>
          ))}
        </div>

        {/* tavoitteet */}
        <div>
          <SectionLabel>{t("goals_section")}</SectionLabel>
          <Card bare style={{ overflow: "hidden", border: "1px solid var(--border-subtle)", boxShadow: "var(--shadow-sm)", padding: 0 }}>
            {[
              { k: "steps", icon: "footprints", tint: "var(--sage-500)", label: t("goal_steps_l"), unit: t("u_steps"), step: 500, min: 1000 },
              { k: "energy", icon: "flame", tint: "var(--apricot-500)", label: t("goal_energy_l"), unit: t("u_kcal"), step: 50, min: 800 },
              { k: "activeMin", icon: "activity", tint: "var(--brand-500)", label: t("goal_active"), unit: t("u_min"), step: 5, min: 5 },
              { k: "water", icon: "droplet", tint: "var(--brand-400)", label: t("goal_water"), unit: t("u_glasses"), step: 1, min: 1 },
            ].map((row, i, arr) => (
              <div key={row.k} style={{ display: "flex", alignItems: "center", gap: 13, padding: "13px 16px", borderBottom: i < arr.length - 1 ? "1px solid var(--border-subtle)" : "none" }}>
                <div style={{ width: 36, height: 36, borderRadius: 11, background: "var(--ink-50)", color: row.tint, display: "grid", placeItems: "center", flexShrink: 0 }}><L name={row.icon} size={19} /></div>
                <div style={{ flex: 1, minWidth: 0 }}>
                  <div style={{ fontSize: 14.5, fontWeight: 600 }}>{row.label}</div>
                  <div style={{ fontSize: 13, color: "var(--text-muted)", fontVariantNumeric: "tabular-nums" }}>{window.numFmt(lang, g[row.k])} {row.unit}</div>
                </div>
                <div style={{ display: "flex", gap: 6 }}>
                  <button onClick={() => store.updateGoals({ [row.k]: Math.max(row.min, g[row.k] - row.step) })} style={stepBtn}><L name="minus" size={16} strokeWidth={2.4} /></button>
                  <button onClick={() => store.updateGoals({ [row.k]: g[row.k] + row.step })} style={stepBtn}><L name="plus" size={16} strokeWidth={2.4} /></button>
                </div>
              </div>
            ))}
          </Card>
        </div>

        {/* valikko */}
        <div>
          <SectionLabel>{t("menu_section")}</SectionLabel>
          <Card bare style={{ overflow: "hidden", border: "1px solid var(--border-subtle)", boxShadow: "var(--shadow-sm)", padding: 0 }}>
            {menu.map((m, i) => (
              <button key={m.id} onClick={() => onNav(m.id)} style={{
                width: "100%", display: "flex", alignItems: "center", gap: 13, padding: "14px 16px", border: "none",
                borderBottom: i < menu.length - 1 ? "1px solid var(--border-subtle)" : "none", background: "transparent",
                cursor: "pointer", fontFamily: "var(--font-sans)", textAlign: "left",
              }}>
                <div style={{ width: 36, height: 36, borderRadius: 11, background: "var(--brand-50)", color: "var(--brand-600)", display: "grid", placeItems: "center", flexShrink: 0 }}><L name={m.icon} size={19} /></div>
                <span style={{ flex: 1, fontSize: 15, fontWeight: 600, color: "var(--text-primary)" }}>{m.label}</span>
                <L name="chevron-right" size={19} color="var(--ink-300)" />
              </button>
            ))}
          </Card>
        </div>

        {/* kirjaudu ulos */}
        <Card padding="md">
          {!confirmLogout ? (
            <button onClick={() => setConfirmLogout(true)} style={{ width: "100%", display: "flex", alignItems: "center", gap: 13, border: "none", background: "transparent", cursor: "pointer", fontFamily: "var(--font-sans)", textAlign: "left", padding: 0 }}>
              <div style={{ width: 36, height: 36, borderRadius: 11, background: "var(--status-error-bg)", color: "var(--coral-700)", display: "grid", placeItems: "center", flexShrink: 0 }}><L name="log-out" size={18} /></div>
              <span style={{ flex: 1, fontSize: 15, fontWeight: 700, color: "var(--coral-700)" }}>{t("m_logout")}</span>
            </button>
          ) : (
            <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>

              </div>

}

/* =============================== Tietojen vienti ============================== */
function buildCSV(store, lang) {
  const t = window.makeT(lang);
  const moodLabel = (v) => { const m = (window.MOODS || []).find((x) => x.value === v); return m ? t(m.key) : ""; };
  const head = ["Päivä", "Tyyppi", "Kuvaus", "Energia (kcal)", "Kesto (min)", "Askeleet", "Fiilis"];
  const esc = (v) => { const s = String(v == null ? "" : v); return /[",;\n]/.test(s) ? '"' + s.replace(/"/g, '""') + '"' : s; };
  const rows = [head];
  const keys = Object.keys(store.state.days).sort();
  keys.forEach((k) => {
    const d = store.state.days[k];
    (d.meals || []).forEach((m) => rows.push([k, "Ateria", m.text || "", m.kcal || "", "", "", ""]));
    (d.workouts || []).forEach((w) => rows.push([k, "Harjoitus", w.name || "", w.kcal || "", w.mins || "", "", ""]));
    if (d.steps || d.mood) rows.push([k, "Päivä", "", "", "", d.steps || "", moodLabel(d.mood)]);
  });
  return "\uFEFF" + rows.map((r) => r.map(esc).join(";")).join("\r\n");
}

function downloadBlob(content, filename, type) {
  const blob = new Blob([content], { type });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click();
  setTimeout(() => { document.body.removeChild(a); URL.revokeObjectURL(url); }, 800);
}

function buildSummaryHTML(store, lang) {
  const t = window.makeT(lang);
  const p = store.state.profile;
  const keys = Object.keys(store.state.days).sort();
  let totalKcalIn = 0, totalMin = 0, totalSteps = 0, meals = 0, workouts = 0;
  const rowsHtml = keys.map((k) => {
    const d = store.state.days[k];
    const kc = (d.meals || []).reduce((a, m) => a + (Number(m.kcal) || 0), 0);
    const mn = (d.workouts || []).reduce((a, w) => a + (Number(w.mins) || 0), 0);
    totalKcalIn += kc; totalMin += mn; totalSteps += d.steps || 0; meals += (d.meals || []).length; workouts += (d.workouts || []).length;
    const mealList = (d.meals || []).map((m) => m.text).filter(Boolean).join(", ");
    return `<tr><td>${k}</td><td>${(d.meals||[]).length}</td><td style="color:#5E657E">${mealList||"—"}</td><td>${kc||"—"}</td><td>${(d.workouts||[]).length}</td><td>${mn||"—"}</td><td>${d.steps||"—"}</td></tr>`;
  }).join("");
  const teal = "#75595D";
  return `<!doctype html><html lang="${lang}"><head><meta charset="utf-8"><title>Vire — ${t("export_title")}</title>
  <style>
    *{box-sizing:border-box} body{font-family:-apple-system,'Plus Jakarta Sans',Segoe UI,Roboto,sans-serif;color:#272B3D;margin:0;padding:40px;background:#fff}
    h1{font-size:26px;margin:0 0 4px} .sub{color:#5E657E;margin:0 0 24px;font-size:14px}
    .brand{display:flex;align-items:center;gap:10px;margin-bottom:26px}
    .dot{width:30px;height:30px;border-radius:9px;background:${teal};display:grid;place-items:center;color:#fff;font-weight:800}
    .cards{display:flex;gap:12px;margin:0 0 26px;flex-wrap:wrap}
    .c{flex:1;min-width:120px;border:1px solid #E2E5EE;border-radius:14px;padding:14px 16px}
    .c .n{font-size:24px;font-weight:800} .c .l{font-size:12px;color:#5E657E;font-weight:600}
    table{width:100%;border-collapse:collapse;font-size:13px} th,td{text-align:left;padding:9px 10px;border-bottom:1px solid #EDEFF4}
    th{font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:#818AA1}
    tfoot td{font-weight:800;border-top:2px solid #C8CCD9}
    @media print{body{padding:18px}}
  </style></head><body>
  <div class="brand"><div class="dot">V</div><div><div style="font-weight:800;font-size:18px">Vire</div></div></div>
  <h1>${t("export_title")}</h1>
  <p class="sub">${p.name ? p.name + " · " : ""}${window.longDateL(lang)}</p>
  <div class="cards">
    <div class="c"><div class="n">${meals}</div><div class="l">${t("st_meals")}</div></div>
    <div class="c"><div class="n">${workouts}</div><div class="l">${t("st_workouts")}</div></div>
    <div class="c"><div class="n">${totalMin}</div><div class="l">${t("activemin_label")}</div></div>
    <div class="c"><div class="n">${window.numFmt(lang, totalSteps)}</div><div class="l">${t("goal_steps")}</div></div>
  </div>
  <table><thead><tr><th>${t("nav_diary").split(" ")[0]}</th><th>${t("st_meals")}</th><th>${t("foodhist_recent")}</th><th>kcal</th><th>${t("workouts_label")}</th><th>min</th><th>${t("goal_steps")}</th></tr></thead>
  <tbody>${rowsHtml || `<tr><td colspan="7" style="text-align:center;color:#818AA1;padding:24px">${t("export_empty")}</td></tr>`}</tbody></table>
  <p style="margin-top:26px;color:#818AA1;font-size:11px">${t("export_note")}</p>
  </body></html>`;
}

function ExportView({ store, t, lang, onBack, onMenu }) {
  const { Card, Button } = window.VS;
  const { L, PageHeader } = window;
  const [done, setDone] = React.useState("");
  const hasData = Object.keys(store.state.days).length > 0;

  const exportCSV = () => {
    downloadBlob(buildCSV(store, lang), `vire-tiedot-${window.dateKey()}.csv`, "text/csv;charset=utf-8");
    setDone("csv"); setTimeout(() => setDone(""), 2200);
  };
  const exportPDF = () => {
    const html = buildSummaryHTML(store, lang);
    const w = window.open("", "_blank");
    if (w) { w.document.write(html); w.document.close(); setTimeout(() => { try { w.focus(); w.print(); } catch (e) {} }, 350); }
    else { downloadBlob(html, `vire-koonti-${window.dateKey()}.html`, "text/html"); }
    setDone("pdf"); setTimeout(() => setDone(""), 2200);
  };

  const row = (icon, tint, label, sub, onClick, key) => (
    <button onClick={onClick} disabled={!hasData} style={{
      width: "100%", display: "flex", alignItems: "center", gap: 14, padding: "16px", border: "none", textAlign: "left",
      background: "var(--surface-card)", borderRadius: 16, cursor: hasData ? "pointer" : "default", fontFamily: "var(--font-sans)",
      boxShadow: "var(--shadow-sm)", opacity: hasData ? 1 : 0.55, border: "1px solid var(--border-subtle)",
    }}>
      <div style={{ width: 46, height: 46, borderRadius: 14, background: tint + "22", color: tint, display: "grid", placeItems: "center", flexShrink: 0 }}><L name={icon} size={22} /></div>
      <div style={{ flex: 1, minWidth: 0 }}>
        <div style={{ fontSize: 15.5, fontWeight: 700 }}>{label}</div>
        <div style={{ fontSize: 12.5, color: "var(--text-muted)", lineHeight: 1.4 }}>{sub}</div>
      </div>
      {done === key ? <span style={{ display: "inline-flex", alignItems: "center", gap: 5, color: "var(--green-700)", fontWeight: 700, fontSize: 13 }}><L name="check-circle-2" size={17} /> {t("export_done")}</span> : <L name="download" size={20} color="var(--ink-400)" />}
    </button>
  );

  return (
    <div>
      <PageHeader title={t("export_title")} onBack={onBack} onMenu={onMenu} />
      <div style={{ padding: "0 20px", display: "flex", flexDirection: "column", gap: 14 }}>
        <div style={{ fontSize: 14, color: "var(--text-secondary)", margin: "-2px 4px 0", lineHeight: 1.45 }}>{t("export_sub")}</div>
        {!hasData ? <Card soft padding="md" style={{ fontSize: 13.5, color: "var(--text-muted)", textAlign: "center" }}>{t("export_empty")}</Card> : null}
        {row("file-spreadsheet", "#75595D", t("export_csv"), t("export_csv_s"), exportCSV, "csv")}
        {row("file-text", "#C47E52", t("export_pdf"), t("export_pdf_s"), exportPDF, "pdf")}
        <Card soft padding="md" style={{ display: "flex", alignItems: "center", gap: 12 }}>
          <L name="shield" size={20} color="var(--brand-600)" />
          <div style={{ fontSize: 13, color: "var(--text-secondary)", lineHeight: 1.45 }}>{t("export_note")}</div>
        </Card>
      </div>
    </div>
  );
}

const linkBtn = { border: "none", background: "transparent", color: "var(--brand-600)", fontWeight: 700, fontSize: 13.5, cursor: "pointer", fontFamily: "var(--font-sans)", padding: 0 };

Object.assign(window, { LicenseView, MessagesView, ExportView });

</script>

      const p = store.state.profile;
      const menuHeader = (
        <div style={{ display: "flex", alignItems: "center", gap: 11 }}>
          {p.photo
            ? <img src={p.photo} alt={p.name} style={{ width: 40, height: 40, borderRadius: "50%", objectFit: "cover" }} />
            : <window.VS.Avatar name={p.name || "?"} size="md" />}
          <div style={{ minWidth: 0 }}>
            <div style={{ fontSize: 15, fontWeight: 800, whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>{p.name || "Vire"}</div>
            <div style={{ fontSize: 12, color: "var(--text-muted)", fontWeight: 600 }}>{t("menu_title")}</div>
          </div>
        </div>
      );
      const menuFooter = (
        <div style={{ textAlign: "center", fontSize: 11.5, color: "var(--text-muted)", lineHeight: 1.6 }}>Vire · {t("version")} {store.version}</div>
      );

      return (
        <React.Fragment>
          {content}
          <window.MenuDrawer open={menuOpen} onClose={() => setMenuOpen(false)} items={menuItems} header={menuHeader} footer={menuFooter} />
        </React.Fragment>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<Root />);
  </script>

</body>
</html>
